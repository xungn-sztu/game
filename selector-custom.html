<meta charset="utf-8">
<style>
  :root {
    --panel: rgba(18, 23, 32, 0.96);
    --panel-2: rgba(11, 16, 24, 0.72);
    --line: #2c3a4d;
    --line-2: #3a4a60;
    --text: #d8e0ea;
    --muted: #98a7ba;
    --accent: #52a7ff;
    --accent-2: #2878ff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 18px;
    background: transparent;
    color: var(--text);
    font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  }
  .panel {
    max-width: 980px;
    margin: 0 auto;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 18px 40px rgba(0, 0, 0, 0.32);
  }
  .hero {
    padding: 20px 22px;
    border-bottom: 1px solid var(--line);
    background: linear-gradient(135deg, rgba(63, 95, 143, 0.18), rgba(18, 24, 33, 0.4));
  }
  .hero h1 {
    margin: 0 0 8px;
    font-size: 22px;
    color: #f4f7fb;
  }
  .hero p {
    margin: 0;
    font-size: 13px;
    line-height: 1.75;
    color: var(--muted);
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
    padding: 16px;
  }
  .field {
    border: 1px solid var(--line);
    border-radius: 12px;
    background: var(--panel-2);
    padding: 12px;
  }
  .field label {
    display: block;
    margin-bottom: 8px;
    font-size: 12px;
    font-weight: 700;
    color: #bcc7d4;
  }
  .field select,
  .field input,
  .field textarea {
    width: 100%;
    border: 1px solid var(--line-2);
    border-radius: 10px;
    background: #0c1219;
    color: #edf2f8;
    padding: 10px 12px;
    font-size: 13px;
  }
  .field textarea {
    min-height: 96px;
    resize: vertical;
  }
  .wide { grid-column: 1 / -1; }
  .tips {
    margin: 0 16px 16px;
    padding: 12px 14px;
    border: 1px dashed #40526a;
    border-radius: 12px;
    color: #96a5b7;
    font-size: 12px;
    line-height: 1.7;
  }
  .footer {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    padding: 16px;
    border-top: 1px solid var(--line);
  }
  .summary {
    color: #8e9caf;
    font-size: 12px;
    line-height: 1.6;
  }
  .actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .btn {
    border: 1px solid #41526a;
    border-radius: 10px;
    padding: 11px 16px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
  }
  .btn-secondary {
    background: rgba(18, 24, 33, 0.9);
    color: #c2ccd8;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent-2), var(--accent));
    color: #fff;
    border-color: transparent;
  }
  @media (max-width: 920px) {
    .grid { grid-template-columns: 1fr; }
    .footer { flex-direction: column; }
    .btn { width: 100%; }
  }
</style>
<div class="panel">

  </div>

    <div class="field"><label for="personality">性格底色</label><select id="personality"><option selected>冰山脸</option><option>刀子嘴豆腐心</option><option>软柿子好捏</option><option>闷葫芦</option><option>人来疯</option><option>玻璃心</option><option>强装冷静</option><option>温柔克制</option></select></div>

    <div class="field"><label for="libido">性欲程度</label><select id="libido"><option>性冷淡</option><option>低性欲</option><option selected>正常 moderate</option><option>高性欲</option><option>极强/成瘾</option><option>周期波动型</option><option>情境依赖型</option><option>压抑型</option><option>心理型</option><option>目标驱动型</option><option>被动唤起型</option></select></div>
    <div class="field"><label for="channel">认识渠道</label><select id="channel"><option>血亲</option><option>隔壁邻居</option><option>同学长辈</option><option>服务行业</option><option>曾经师生</option><option selected>完全陌生</option><option>工作同事</option><option>网络社交</option><option>朋友介绍</option><option>医患关系</option><option>健身场所</option><option>房东租客</option><option>餐饮偶遇</option><option>娱乐社交</option><option>旅途偶遇</option><option>直播打赏</option><option>业务关系</option></select></div>

    <div class="field"><label for="life">生活渗透度</label><select id="life"><option selected>纯线上</option><option>见过面</option><option>去过私人空间</option><option>过夜</option><option>金钱往来</option><option>见过亲友</option><option>互赠礼物</option><option>生活照顾</option><option>共同经历</option><option>知道隐私</option><option>互相帮忙</option><option>伪装关系</option></select></div>
    <div class="field"><label for="fetish">性癖偏好</label><select id="fetish"><option selected>尺寸崇拜</option><option>内射癖</option><option>怀孕/生殖癖</option><option>后入癖</option><option>口交癖</option><option>潮吹癖</option><option>轻微露出</option><option>拍摄记录癖</option><option>被视奸/偷窥癖</option><option>户外/野外癖</option><option>被羞辱/贬低癖</option><option>ddlg/幼化癖</option><option>女王/被崇拜癖</option><option>束缚/控制癖</option><option>角色扮演癖</option><option>禁忌/乱伦幻想</option><option>NTR/绿帽癖</option><option>职场权力癖</option><option>偷情感</option><option>气味癖</option><option>声音癖</option><option>疼痛癖</option><option>交换癖</option><option>多人癖</option><option>奉献癖</option></select></div>
    <div class="field wide"><label for="extra">额外要求</label><textarea id="extra" placeholder="如：保留某种职业气质、补几个身体细节、想要哪类边缘癖好、名字风格等"></textarea></div>
  </div>
  <div class="tips">首轮硬要求只有两条：1. 必须先把角色写进固定槽位。2. <code>&lt;UpdateVariable&gt;</code> 结束后，可见正文只能是 <code>【注册主页】</code> 和 <code>&lt;StatusPlaceHolderImpl/&gt;</code> 两行。</div>
  <div class="footer">
    <div class="summary">定制的是角色，不是剧情。这里只负责把第一位角色稳定建档进角色页，后续剧情交给注册页之后继续跑。</div>
    <div class="actions"><button class="btn btn-secondary" type="button" onclick="Forum1Selector.resetDefaults()">恢复默认</button><button class="btn btn-primary" type="button" onclick="Forum1Selector.fillOnly()">填入输入栏</button></div>
  </div>
</div>
<script>
  (function () {
    function getContext() {
      try { if (window.SillyTavern && typeof window.SillyTavern.getContext === "function") return window.SillyTavern.getContext(); } catch (error) {}
      try { if (window.parent && window.parent.SillyTavern && typeof window.parent.SillyTavern.getContext === "function") return window.parent.SillyTavern.getContext(); } catch (error) {}
      return null;
    }
    function setDomInput(text) {
      const textarea = document.querySelector("#send_textarea") || document.querySelector('textarea[name="message"]') || document.querySelector(".message-input textarea") || document.querySelector('[data-testid="chat-input"] textarea') || document.querySelector("textarea");
      if (!textarea) return false;
      const desc = Object.getOwnPropertyDescriptor(HTMLTextAreaElement.prototype, "value");
      if (desc && typeof desc.set === "function") desc.set.call(textarea, text); else textarea.value = text;
      textarea.dispatchEvent(new Event("input", { bubbles: true, cancelable: true }));
      textarea.dispatchEvent(new Event("change", { bubbles: true }));
      textarea.focus();
      return true;
    }
    async function setInput(text) {
      const ctx = getContext();
      if (ctx && typeof ctx.executeSlashCommands === "function") {
        try {
          await ctx.executeSlashCommands(`/setinput ${text}`);
          const textarea = document.querySelector("#send_textarea");
          if (textarea && String(textarea.value || "").trim()) return true;
        } catch (error) {}
      }
      return setDomInput(text);
    }
    function valueOf(id) {
      const el = document.getElementById(id);
      return el ? String(el.value || "").trim() : "";
    }
    function buildPrompt() {
      return [
        "【定制女角色并首轮建档】",
        "",
        "请只根据以下条件定制一名女角色，并写入当前 MVU 固定槽位。",
        `年龄区间：${valueOf("age")}`,
        `人种/外貌：${valueOf("race")}`,
        `职业类型：${valueOf("job")}`,
        `公开头衔：${valueOf("title") || "根据职业自动生成"}`,
        `身材类型：${valueOf("body")}`,
        `颜值水平：${valueOf("face")}`,
        `性格底色：${valueOf("personality")}`,
        `婚姻状况：${valueOf("marriage")}`,
        `身体开发等级：${valueOf("dev")}`,
        `性态度：${valueOf("attitude")}`,
        `性开放程度：${valueOf("open")}`,
        `性欲程度：${valueOf("libido")}`,
        `认识渠道：${valueOf("channel")}`,
        `关系性质：${valueOf("relation")}`,
        `情感深度：${valueOf("emotion")}`,
        `亲密程度：${valueOf("intimacy")}`,
        `生活渗透度：${valueOf("life")}`,
        `性癖偏好：${valueOf("fetish")}`,
        `额外要求：${valueOf("extra") || "无"}`,
        "",
        "硬性要求：",
        "1. 同一条回复里，先且只输出一个合法的 <UpdateVariable> 块。",
        "2. 首轮只能写固定槽位：/角色索引/档案1、/角色详情/档案1、/女角色档案/档案1。",
        "3. 首轮至少写入这些摘要字段：角色名、是否已建档、当前是否在场、公开头衔、关系性质、情感深度、生活渗透度、亲密程度、最近更新。",
        "4. 角色索引和角色详情里都要写角色名，不能留空。",
        "5. 注册开场阶段必须设置：是否已建档=true、当前是否在场=false、最近更新=注册前建档。",
        "6. 不要写关系走向，不要输出角色档案总结，不要输出字段回显。",
        "7. 只能使用 RFC 6902 的 replace，不允许 insert、delta、append、remove、move。",
        "8. <UpdateVariable> 结束后，可见正文只能有两行：第一行【注册主页】；第二行<StatusPlaceHolderImpl/>。",
        "9. 不允许 raw html、fenced html、thinking、analysis_block、undefined。",
        "10. 这是定制角色，不是开剧情，当前任务仅是稳定建档并进入注册页。"
      ].join("\\n");
    }
    const defaults = { age: "23-27岁", race: "东亚婉约", job: "学生", title: "", body: "匀称标准", face: "中上(7-8分)", personality: "冰山脸", marriage: "单身", dev: "未开发", attitude: "嘴硬身软型", open: "传统保守型", libido: "正常 moderate", channel: "完全陌生", relation: "单方面关注", emotion: "刚认识", intimacy: "零接触", life: "纯线上", fetish: "尺寸崇拜", extra: "" };
    window.Forum1Selector = {
      async fillOnly() { await setInput(buildPrompt()); },
      resetDefaults() { Object.keys(defaults).forEach((key) => { const el = document.getElementById(key); if (el) el.value = defaults[key]; }); }
    };
  })();
</script>
