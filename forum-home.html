<meta charset="utf-8">
<style>
  :root { --bg:#09111d; --panel:#101b2b; --panel2:#0d1725; --line:#27364a; --text:#dbe8f6; --muted:#8ca1b8; --accent:#6eb7ff; --warn:#d9b36a; }
  * { box-sizing:border-box; }
  body { margin:0; padding:14px; background:transparent; color:var(--text); font-family:"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; }
  .app { max-width:860px; margin:0 auto; border:1px solid var(--line); border-radius:18px; overflow:hidden; background:linear-gradient(180deg,#0a111d,#101a29); box-shadow:0 20px 48px rgba(0,0,0,.36); }
  .head { display:flex; justify-content:space-between; gap:12px; padding:16px 18px; border-bottom:1px solid var(--line); }
  h1 { margin:0; font-size:20px; }
  .sub { margin-top:5px; color:var(--muted); font-size:12px; line-height:1.6; }
  .badge { align-self:flex-start; padding:5px 9px; border:1px solid rgba(110,183,255,.35); border-radius:999px; color:var(--accent); font-size:12px; white-space:nowrap; }
  .body { padding:16px; display:grid; gap:14px; }
  .notice, .card { border:1px solid var(--line); border-radius:14px; background:rgba(13,23,37,.78); padding:13px; }
  .notice { color:var(--muted); line-height:1.7; font-size:12px; }
  .grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:12px; }
  .card-title { font-size:15px; font-weight:700; margin-bottom:6px; }
  .card-meta { color:var(--muted); font-size:12px; line-height:1.6; }
  .tags { display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; }
  button { border:1px solid #344961; border-radius:999px; padding:8px 12px; background:#132235; color:#cfe2f7; cursor:pointer; }
  button:hover { border-color:var(--accent); color:var(--accent); }
  .hot { color:var(--warn); }
  @media (max-width:680px){ .grid{grid-template-columns:1fr;} .head{display:block;} .badge{display:inline-block;margin-top:10px;} }
</style>
<div class="app">
  <div class="head">
    <div>
      <h1>夜庭论坛</h1>
      <div class="sub">独立论坛页。这里是传闻、炫耀、物色和交易入口，不等于现实真相。</div>
    </div>
    <div class="badge" id="forumMeta">载入中</div>
  </div>
  <div class="body">
    <div class="notice">你看到的是论坛页面本身，而不是上帝视角档案。帖子只能改变你的认知和试探方向，不能直接改写角色真值。</div>
    <div class="grid" id="zones"></div>
    <div class="card">
      <div class="card-title">快捷操作</div>
      <div class="tags">
        <button data-fill="查看论坛热帖">查看热帖</button>
        <button data-fill="搜索论坛关键词：">搜索关键词</button>
        <button data-fill="查看论坛私信">查看私信</button>
        <button data-fill="浏览黑料市场">黑料市场</button>
      </div>
    </div>
  </div>
</div>
<script>
(function(){
  const K={forum:'暗网论坛',account:'我的账户',level:'等级',zoneMap:'分区数据',posts:'帖子列表',title:'标题',hotness:'热度',cred:'可信度',summary:'内容摘要'};
  function hostDoc(){try{return window.parent&&window.parent.document?window.parent.document:document}catch(e){return document}}
  function setDomInput(v){const d=hostDoc();const t=d.querySelector('#send_textarea')||d.querySelector('textarea[name="message"]')||d.querySelector('textarea');if(!t)return false;const desc=Object.getOwnPropertyDescriptor(window.HTMLTextAreaElement.prototype,'value');if(desc&&desc.set)desc.set.call(t,v);else t.value=v;t.dispatchEvent(new Event('input',{bubbles:true,cancelable:true}));t.dispatchEvent(new Event('change',{bubbles:true}));t.focus();return true}
  async function fill(v){if(setDomInput(v))return true;try{const ctx=(window.SillyTavern||window.parent.SillyTavern).getContext();if(ctx&&ctx.executeSlashCommands)await ctx.executeSlashCommands('/setinput '+v)}catch(e){}}
  function get(o,p,f){let c=o;for(const k of p){if(!c||typeof c!=='object')return f;c=c[k]}return c===undefined?f:c}
  function esc(v){return String(v==null?'':v).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
  function norm(v){if(v&&typeof v==='object')return v;if(typeof v==='string'){try{return JSON.parse(v)}catch(e){}}return {}}
  function allVars(){try{if(window.getAllVariables)return norm(window.getAllVariables().stat_data)}catch(e){}try{const ctx=(window.SillyTavern||window.parent.SillyTavern).getContext();if(ctx&&ctx.variables&&ctx.variables.local)return norm(ctx.variables.local.get('stat_data'))}catch(e){}return {}}
  function style(zone){if(/炫耀|淫妻/.test(zone))return '炫耀区';if(/爆料|视频|图文/.test(zone))return '爆料区';if(/物色|约炮|文爱/.test(zone))return '物色区';if(/交易|服务|主仆|市场/.test(zone))return '交易/服务区';return '传闻层'}
  function render(){const stat=allVars();const account=get(stat,[K.forum,K.account],{});document.getElementById('forumMeta').textContent=(account[K.level]||'游客')+' · 论坛入口';const map=get(stat,[K.forum,K.zoneMap],{})||{};const zones=Object.keys(map);document.getElementById('zones').innerHTML=zones.length?zones.map(z=>{const posts=Object.values(get(map,[z,K.posts],{})||{});const top=posts[0]||{};const title=top[K.title]||'暂无热帖';return `<div class="card"><div class="card-title">${esc(z)} <span class="hot">${esc(style(z))}</span></div><div class="card-meta">帖子 ${posts.length} 条｜${esc(title)}</div><div class="tags"><button data-fill="${esc('进入论坛分区：'+z)}">进入分区</button><button data-fill="${esc('查看帖子：'+(top[K.title]||z+'热帖'))}">查看热帖</button></div></div>`}).join(''):'<div class="card"><div class="card-title">暂无分区数据</div><div class="card-meta">可以先要求刷新论坛主页。</div></div>'}
  document.addEventListener('click',e=>{const b=e.target.closest('[data-fill]');if(b)fill(b.dataset.fill)});
  render();setTimeout(render,500);setInterval(render,2500);
})();
</script>
