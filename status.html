<meta charset="utf-8">
<style>
  :root {
    --panel: rgba(17, 24, 35, 0.97);
    --panel-2: rgba(20, 28, 40, 0.82);
    --line: #2d3742;
    --line-2: #344152;
    --text: #dbe4ee;
    --muted: #8fa1b5;
    --accent: #66b5ff;
    --accent-bg: rgba(44, 114, 185, 0.18);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    padding: 12px;
    background: transparent;
    color: var(--text);
    font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  }

  .card {
    max-width: 780px;
    margin: 0 auto;
    border: 1px solid var(--line);
    border-radius: 16px;
    overflow: hidden;
    background: linear-gradient(180deg, rgba(11, 16, 24, 0.98), rgba(20, 28, 40, 0.98));
    box-shadow: 0 18px 40px rgba(0, 0, 0, 0.34);
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--line);
    background: rgba(0, 0, 0, 0.2);
  }

  .title {
    font-size: 16px;
    font-weight: 700;
    color: #f8fbff;
  }

  .meta {
    font-size: 11px;
    line-height: 1.5;
    color: var(--muted);
    text-align: right;
  }

  .tabs {
    display: flex;
    gap: 8px;
    overflow: auto;
    padding: 10px 12px;
    border-bottom: 1px solid var(--line);
    background: rgba(13, 19, 28, 0.8);
  }

  .tab {
    border: 1px solid var(--line-2);
    border-radius: 999px;
    padding: 8px 12px;
    background: rgba(22, 30, 42, 0.88);
    color: #90a0b5;
    cursor: pointer;
    font-size: 12px;
  }

  .tab.active,
  .detail-tab.active-detail-tab {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-bg);
  }

  .content { padding: 14px; }

  .section {
    margin-bottom: 12px;
    padding: 12px;
    border: 1px solid var(--line);
    border-radius: 12px;
    background: var(--panel-2);
  }

  .section:last-child { margin-bottom: 0; }

  .section-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
    color: #f8fbff;
    font-size: 13px;
    font-weight: 700;
  }

  .badge {
    padding: 2px 8px;
    border: 1px solid var(--line-2);
    border-radius: 999px;
    color: #90a0b5;
    font-size: 10px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
  }

  .label {
    color: var(--muted);
    font-size: 12px;
  }

  .value {
    margin-top: 3px;
    word-break: break-word;
  }

  .field-note {
    margin-top: 4px;
    color: #7f95ad;
    font-size: 11px;
    line-height: 1.5;
  }

  .known-value {
    color: #e7eef7;
  }

  .inferred-value {
    color: #9ec7ff;
  }

  .unknown-value {
    color: #90a0b5;
    font-style: italic;
  }

  .pill-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .pill,
  .action {
    border: 1px solid var(--line-2);
    border-radius: 999px;
    padding: 8px 12px;
    background: rgba(22, 30, 42, 0.88);
    color: #90a0b5;
    cursor: pointer;
  }

  .action[disabled] {
    cursor: default;
    opacity: 0.45;
  }

  .char {
    margin-bottom: 8px;
    padding: 10px;
    border: 1px solid var(--line-2);
    border-radius: 10px;
    background: rgba(12, 18, 27, 0.56);
  }

  .char-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }

  .char-name {
    font-size: 13px;
    font-weight: 700;
    color: #f8fbff;
  }

  .char-sub {
    margin-top: 3px;
    font-size: 11px;
    color: var(--muted);
  }

  .mini-card {
    padding: 10px 12px;
    border: 1px solid rgba(102, 181, 255, 0.18);
    border-radius: 10px;
    background: rgba(8, 13, 22, 0.5);
  }

  .pager {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid rgba(255, 255, 255, 0.06);
  }

  .empty {
    text-align: center;
    padding: 12px 0;
    color: var(--muted);
    font-size: 11px;
  }

  .debug,
  .notice {
    margin-top: 10px;
    color: #8ea2ba;
    font-size: 11px;
    line-height: 1.7;
    white-space: pre-wrap;
  }

  .notice {
    margin-bottom: 10px;
    padding: 10px 12px;
    border: 1px dashed rgba(102, 181, 255, 0.35);
    border-radius: 10px;
    background: rgba(15, 24, 35, 0.55);
  }

  @media (max-width: 640px) {
    .grid { grid-template-columns: 1fr; }
  }
</style>

<div class="card">
  <div class="header">
    <div class="title">论坛1号</div>
    <div class="meta" id="meta">未同步<br>电脑桌前</div>
  </div>
  <div class="tabs">
    <button class="tab active" data-tab="overview">概览</button>
    <button class="tab" data-tab="present">在场</button>
    <button class="tab" data-tab="chars">角色</button>
    <button class="tab" data-tab="forum">论坛</button>
    <button class="tab" data-tab="account">账户/市场</button>
  </div>
  <div class="content" id="content">
    <div class="section">
      <div class="section-head">
        <span>概览</span>
        <span class="badge">初始化</span>
      </div>
      <div class="empty">正在等待变量载入</div>
    </div>
  </div>
</div>

<script>
  (function () {
    const script = document.createElement('script');
    script.src = './status-app.js?' + Date.now();
    document.body.appendChild(script);
  })();
</script>
