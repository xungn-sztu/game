<meta charset="utf-8">
<style>
  :root {
    --panel: rgba(17, 24, 35, 0.97);
    --line: #2d3742;
    --line-2: #344152;
    --text: #dbe4ee;
    --muted: #8fa1b5;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 12px;
    background: transparent;
    color: var(--text);
    font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  }
  .box {
    max-width: 780px;
    margin: 0 auto;
    padding: 18px 20px;
    border: 1px solid var(--line);
    border-radius: 16px;
    background: linear-gradient(180deg, rgba(11, 16, 24, 0.96), var(--panel));
    box-shadow: 0 18px 40px rgba(0, 0, 0, 0.32);
  }
  .head {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: center;
    margin-bottom: 14px;
  }
  .title {
    font-size: 18px;
    font-weight: 700;
    color: #f8fbff;
  }
  .meta {
    font-size: 11px;
    line-height: 1.5;
    color: var(--muted);
    text-align: right;
  }
  .text {
    font-size: 14px;
    line-height: 1.85;
    color: var(--text);
  }
  .action {
    margin-top: 12px;
    padding: 12px 14px;
    border: 1px solid var(--line-2);
    border-radius: 12px;
    background: rgba(12, 18, 27, 0.56);
  }
  .label {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .value {
    font-size: 13px;
    color: #f8fbff;
  }
</style>
<div class="box">
  <div class="head">
    <div class="title">论坛注册页</div>
    <div class="meta">初次进入<br />等待输入论坛ID</div>
  </div>
  <div class="text">
    夜里回到家后，我没有立刻去洗漱，只是把钥匙随手放到桌角，走到电脑前坐下。房间里只有主机启动后的轻微嗡鸣，屏幕亮起时，我第一次真正点开了那个藏在旧链接里的论坛页面。
  </div>
  <div class="text" style="margin-top: 10px;">
    页面没有直接跳进内容区，而是先停在了注册页。冷白色的输入框悬在正中，安静地等我写下论坛ID。下方那些匿名板块和露骨标题已经露出了一角，像是在提醒我，我其实已经走到了门口，只差最后一步。
  </div>
  <div class="action">
    <div class="label">当前动作</div>
    <div class="value">输入论坛ID，完成第一次注册</div>
  </div>
</div>
