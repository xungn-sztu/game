<meta charset="utf-8">
<style>
body{margin:0;padding:12px;background:transparent;color:#eee;font-family:"Segoe UI","Microsoft YaHei",sans-serif}
.fv3{max-width:860px;margin:0 auto;background:#141111;border:1px solid rgba(190,38,47,.35);border-radius:18px;overflow:hidden;box-shadow:0 18px 48px rgba(0,0,0,.38)}
.head{display:flex;justify-content:space-between;gap:14px;padding:16px 18px;background:#201919;border-bottom:1px solid rgba(190,38,47,.28)}
.title{font-size:22px;font-weight:900}
.sub{font-size:12px;color:#c4b5b5;line-height:1.7}
.meta{text-align:right;color:#e5d1d1;font-size:13px;line-height:1.55}
.focus{margin:14px 16px 10px;border:1px solid rgba(190,38,47,.32);border-radius:14px;background:#251315;color:#fff;padding:12px 14px;font-weight:700}
.tabs,.subtabs,.exam-tabs{display:flex;gap:8px;flex-wrap:wrap;padding:0 16px 12px}
.subtabs,.exam-tabs{padding:0 0 12px}
.tab,.subtab,.exam-tab,.btn{border:1px solid rgba(190,38,47,.4);background:#281518;color:#f2d6d6;border-radius:999px;padding:8px 13px;cursor:pointer}
.subtab,.exam-tab{background:#181616;padding:7px 11px}
.tab.active,.subtab.active,.exam-tab.active{background:#9b2631;color:#fff}
.content{padding:0 16px 16px}
.panel{display:none}
.panel.active{display:block}
.card{background:#1b1818;border:1px solid rgba(190,38,47,.22);border-radius:14px;padding:14px;margin-bottom:12px}
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.kv{background:#151313;border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:11px}
.k{font-size:12px;color:#b8a6a6;margin-bottom:6px}
.v{font-size:15px;color:#fff;line-height:1.55;word-break:break-word}
.empty{border:1px dashed rgba(190,38,47,.24);border-radius:12px;text-align:center;color:#aaa;padding:22px}
.list{display:grid;gap:10px}
.role{border:1px solid rgba(190,38,47,.22);border-radius:14px;background:#151313;padding:13px}
.top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
.name{font-weight:900;font-size:18px}
.tag{font-size:12px;color:#eac0c0;border:1px solid rgba(190,38,47,.32);border-radius:999px;padding:2px 8px}
.small{font-size:12px;color:#aaa;line-height:1.6}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.btn{background:#1c1717;color:#e7cccc}
h3{margin:0 0 12px 0}
@media(max-width:680px){.grid{grid-template-columns:1fr}.head{display:block}.meta{text-align:left;margin-top:8px}}
</style>
<div class="fv3">
  <div class="head">
    <div>
      <div class="title">论坛v3</div>
      <div class="sub">状态栏只负责当前认知、在场观察、已知角色和社交通知，不承担读心或完全档案。</div>
    </div>
    <div class="meta" id="meta">未同步</div>
  </div>
  <div class="focus" id="focus">正在等待变量载入</div>
  <div class="tabs">
    <button class="tab active" data-tab="overview">概览</button>
    <button class="tab" data-tab="onsite">在场</button>
    <button class="tab" data-tab="roles">角色</button>
    <button class="tab" data-tab="social">社交</button>
  </div>
  <div class="content">
    <div class="panel active" data-panel="overview"></div>
    <div class="panel" data-panel="onsite"></div>
    <div class="panel" data-panel="roles"></div>
    <div class="panel" data-panel="social"></div>
  </div>
</div>
<script>
(function(){
const state={tab:'overview',role:null,roleTab:'summary',examTab:'overview'};
const slots=['档案1','档案2','档案3','档案4','档案5','档案6','档案7','档案8'];
const unknownSet=new Set(['','未知','未确认','未证实','暂无','暂无更新','暂无记录','无','待定','未命名','未命名角色','角色待定','待命名','null','undefined']);

function esc(v){return String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function rec(v){return v&&typeof v==='object'&&!Array.isArray(v)?v:{}}
function norm(v){if(v&&typeof v==='object')return v;if(typeof v==='string'){try{return JSON.parse(v)}catch(e){}}return{}}
function unknownish(v){
  if(v==null) return true;
  if(typeof v==='string') return unknownSet.has(v.trim());
  if(Array.isArray(v)) return !v.length;
  if(typeof v==='object') return !Object.keys(v).length;
  return false;
}
function firstKnown(){
  for(const value of arguments){ if(!unknownish(value)) return value; }
  return '未知';
}
function boolish(v){ return v===true || v==='true' || v===1 || v==='1'; }
function get(obj,path){
  try{
    return path.split('.').reduce((cur,key)=>cur&&Object.prototype.hasOwnProperty.call(cur,key)?cur[key]:undefined,obj);
  }catch(e){ return undefined; }
}
function vars(){
  try{
    if(window.getAllVariables) return norm(window.getAllVariables().stat_data);
  }catch(e){}
  try{
    const st=window.SillyTavern||(window.parent&&window.parent.SillyTavern);
    const ctx=st&&st.getContext?st.getContext():null;
    return norm(ctx?.variables?.local?.get?.('stat_data')||ctx?.chatMetadata?.variables?.stat_data||ctx?.chatMetadata?.stat_data);
  }catch(e){}
  return {};
}
function hostDoc(){ try{return window.parent&&window.parent.document?window.parent.document:document}catch(e){return document} }
function setInput(text){
  try{
    const doc=hostDoc();
    const t=doc.querySelector('#send_textarea')||doc.querySelector('textarea[name="message"]')||doc.querySelector('textarea');
    if(!t) return;
    const desc=Object.getOwnPropertyDescriptor((t.ownerDocument.defaultView||window).HTMLTextAreaElement.prototype,'value');
    if(desc&&desc.set) desc.set.call(t,text); else t.value=text;
    t.dispatchEvent(new Event('input',{bubbles:true,cancelable:true}));
    t.dispatchEvent(new Event('change',{bubbles:true}));
    t.focus();
  }catch(e){}
}
function kv(k,v){ return `<div class="kv"><div class="k">${esc(k)}</div><div class="v">${esc(firstKnown(v))}</div></div>`; }
function grid(rows){ return `<div class="grid">${rows.map(([k,v])=>kv(k,v)).join('')}</div>`; }
function placeholderName(v){
  const s=String(v||'').trim();
  return !s || /待定|未命名|未确认|角色|女人|女性|女教师|陌生女人|某个女人/.test(s);
}
function displayRoleName(name, identity){
  if(!placeholderName(name)) return name;
  if(!unknownish(identity)) return `${identity}（姓名未确认）`;
  return '未命名角色';
}
function displayField(label, value, fallbackText){
  return kv(label, unknownish(value)?(fallbackText||'未知'):value);
}
function normalizeRole(data, slot){
  const idx=rec(get(data,`角色索引.${slot}`));
  const p=rec(get(data,`女角色档案.${slot}`));
  const exam=rec(get(data,`体检记录.${slot}`));
  const social=rec(get(data,`社会关系网.${slot}`));
  const base=rec(p.基础资料);
  const body=rec(p.外观身体);
  const sex=rec(p.性与亲密);
  const rel=rec(p.关系状态);
  const name=firstKnown(p.角色名,idx.角色名,base.角色名);
  const publicIdentity=firstKnown(p.公开身份,idx.公开身份,p.职业,base.职业,idx.职业);
  const normalized={
    slot,
    idx,p,exam,social,base,body,sex,rel,
    built: boolish(p.是否已建档)||boolish(idx.是否已建档)||!placeholderName(name)||!unknownish(publicIdentity),
    name: displayRoleName(name, publicIdentity),
    rawName: name,
    publicIdentity,
    age: firstKnown(p.年龄,base.年龄),
    appearance: firstKnown(p.外貌类型,base.外貌类型,body.外貌类型),
    height: firstKnown(p.身高,base.身高,body.身高),
    bodyType: firstKnown(p.身材类型,body.身材类型),
    job: firstKnown(p.职业,base.职业,idx.职业,publicIdentity),
    marriage: firstKnown(p.婚姻状况,base.婚姻状况),
    acquaintance: firstKnown(p.认识途径,base.认识途径),
    personality: firstKnown(p.性格底色,base.性格底色,base.性格),
    expression: firstKnown(p.表达习惯,base.表达习惯),
    defense: firstKnown(p.防御方式,base.防御方式),
    recentMood: firstKnown(p.近期情绪),
    emotionalRelation: firstKnown(p.感情关系,rel.感情关系,idx.关系摘要),
    physicalRelation: firstKnown(p.肉体关系,rel.肉体关系),
    sexExperience: firstKnown(p.性经验,sex.性经验),
    kink: firstKnown(p.性癖倾向,sex.性癖倾向,sex.性癖),
    libido: firstKnown(p.性欲状态,sex.性欲状态,sex.性欲),
    openness: firstKnown(p.性开放尺度,sex.性开放尺度),
    sexualType: firstKnown(p['性上的类型'],sex['性上的类型']),
    cognition: firstKnown(p.当前认知,'仅记录已知公开信息'),
    recentOffline: firstKnown(p.最近线下互动),
    recentOnline: firstKnown(p.最近网络互动),
    recentUpdate: firstKnown(p.最近更新,idx.最近更新),
    inScene: boolish(idx.当前是否在场)||boolish(p.当前是否在场)
  };
  return normalized;
}
function examOverview(exam){
  const overview=rec(exam.概况);
  return {
    hasRecord: boolish(exam.是否有记录)||boolish(overview.是否有记录),
    source: firstKnown(exam.最近体检来源,overview.最近体检来源,'未确认'),
    confidence: firstKnown(exam.可信度,overview.可信度,'未确认'),
    updatedAt: firstKnown(exam.最近更新时间,overview.最近更新时间,'暂无记录')
  };
}
function normalizeOnsite(data){
  const raw=get(data,'视线内对象');
  if(Array.isArray(raw)) return raw.map(x=>rec(x)).filter(x=>Object.keys(x).length);
  if(raw&&typeof raw==='object'){
    return Object.entries(raw).map(([key,val])=>{
      const item=rec(val);
      if(placeholderName(item.角色名) && !/档案\d+/.test(key)) item.角色名=key;
      return item;
    }).filter(x=>Object.keys(x).length);
  }
  return [];
}
function renderOverview(data){
  return `<div class="card"><h3>当前处境</h3>${grid([
    ['时间',firstKnown(get(data,'世界.完整时间'),`${firstKnown(get(data,'世界.当前日期'))} ${firstKnown(get(data,'世界.当前星期'))} ${firstKnown(get(data,'世界.当前时间'))}`)],
    ['地点',get(data,'世界.当前地点')],
    ['当前状态',get(data,'世界.当前状态')],
    ['当前焦点',get(data,'世界.当前焦点')]
  ])}</div>
  <div class="card"><h3>身上资源</h3>${grid([
    ['身上的钱',get(data,'主角.身上的钱')],
    ['手机状态',get(data,'主角.手机状态')],
    ['论坛等级',get(data,'主角.论坛等级')],
    ['论坛声望',get(data,'主角.论坛声望')]
  ])}</div>
  <div class="card"><h3>眼前变化</h3>${grid([
    ['最近动向',get(data,'世界.最近动向')],
    ['当前提醒',`微信未读 ${firstKnown(get(data,'社交状态.微信未读'),'0')} · 论坛私信 ${firstKnown(get(data,'论坛状态.未读私信'),'0')} · 在场角色 ${normalizeOnsite(data).length}`]
  ])}</div>`;
}
function renderOnsite(data){
  const onsite=normalizeOnsite(data);
  if(!onsite.length) return `<div class="card"><div class="empty">当前视线内没有可观察角色。</div></div>`;
  return `<div class="list">${onsite.map(o=>{
    const name=displayRoleName(o.角色名, firstKnown(o.公开身份,o.身份));
    return `<div class="role">
      <div class="top">
        <div>
          <div class="name">${esc(name)}</div>
          <div class="small">${esc(firstKnown(o.当前观察,'当前只记录一眼能看到的外观和动作'))}</div>
        </div>
        <span class="tag">${esc(firstKnown(o.可感知来源,'亲眼所见'))}</span>
      </div>
      ${grid([
        ['动作姿态',o.动作姿态],
        ['距离感',o.距离感],
        ['发型',firstKnown(o.发型,o.发型发色)],
        ['面部',firstKnown(o.面部,o.面貌)],
        ['上装',o.上装],
        ['下装',o.下装],
        ['内衣可见情况',o.内衣可见情况],
        ['配饰',o.配饰]
      ])}
    </div>`;
  }).join('')}</div>`;
}
function renderExam(normalizedExam){
  const base=rec(normalizedExam.基础数据);
  const measure=rec(normalizedExam.围度体态);
  const priv=rec(normalizedExam.私密确认);
  const fertility=rec(priv.生育与避孕);
  const cycle=rec(priv.生理状态);
  const vulva=rec(priv.阴部确认);
  const anal=rec(priv.后庭确认);
  const tabs=[['overview','概况'],['base','基础数据'],['measure','围度体态'],['private','私密确认']];
  let body='';
  if(state.examTab==='overview'){
    body=grid([
      ['是否有记录',normalizedExam.hasRecord?'是':'否'],
      ['最近体检来源',normalizedExam.source],
      ['可信度',normalizedExam.confidence],
      ['最近更新时间',normalizedExam.updatedAt]
    ]);
  }else if(state.examTab==='base'){
    body=grid([
      ['身高',base.身高],
      ['体重',base.体重],
      ['BMI',base.BMI],
      ['体脂率',base.体脂率]
    ]);
  }else if(state.examTab==='measure'){
    body=grid([
      ['胸围',measure.胸围],
      ['腰围',measure.腰围],
      ['臀围',measure.臀围],
      ['大腿围',measure.大腿围],
      ['罩杯',measure.罩杯],
      ['胸型',measure.胸型],
      ['臀型',measure.臀型]
    ]);
  }else{
    body=`
      ${grid([
        ['确认状态',firstKnown(priv.状态,'未确认')],
        ['确认来源',firstKnown(priv.确认来源,'未确认')],
        ['确认时间',firstKnown(priv.确认时间,'暂无记录')],
        ['可信度',firstKnown(priv.可信度,'未确认')]
      ])}
      <div class="card"><h3>生育与避孕</h3>${grid([
        ['避孕方式',fertility.避孕方式],
        ['风险状态',fertility.风险状态],
        ['最近确认',fertility.最近确认],
        ['是否需要复查',fertility.是否需要复查]
      ])}</div>
      <div class="card"><h3>生理状态</h3>${grid([
        ['周期规律',cycle.周期规律],
        ['近期周期',cycle.近期周期],
        ['妇科健康',cycle.妇科健康],
        ['近期不适',cycle.近期不适]
      ])}</div>
      <div class="card"><h3>阴部确认</h3>${grid([
        ['颜色',vulva.颜色],
        ['毛发管理',vulva.毛发管理],
        ['紧致度',vulva.紧致度],
        ['湿润度',vulva.湿润度],
        ['敏感度',vulva.敏感度],
        ['入口状态',vulva.入口状态],
        ['近期痕迹',vulva.近期痕迹],
        ['恢复情况',vulva.恢复情况]
      ])}</div>
      <div class="card"><h3>后庭确认</h3>${grid([
        ['颜色',anal.颜色],
        ['紧致度',anal.紧致度],
        ['湿润度',anal.湿润度],
        ['敏感度',anal.敏感度],
        ['入口状态',anal.入口状态],
        ['近期痕迹',anal.近期痕迹],
        ['恢复情况',anal.恢复情况]
      ])}</div>`;
  }
  return `<div class="exam-tabs">${tabs.map(([id,label])=>`<button class="exam-tab ${state.examTab===id?'active':''}" data-exam-tab="${id}">${label}</button>`).join('')}</div>${body}`;
}
function renderRoleDetail(role){
  const exam=examOverview(role.exam);
  const social=rec(role.social);
  const tabs=[['summary','摘要'],['body','身体'],['exam','体检'],['relation','性与关系'],['social','社会关系']];
  let inner='';
  if(state.roleTab==='summary'){
    inner=grid([
      ['职业',role.job],
      ['婚姻状况',role.marriage],
      ['性格底色',role.personality],
      ['认识途径',role.acquaintance],
      ['感情关系',role.emotionalRelation],
      ['最近更新',role.recentUpdate]
    ]);
  }else if(state.roleTab==='body'){
    inner=grid([
      ['年龄',role.age],
      ['外貌类型',role.appearance],
      ['身高',role.height],
      ['身材类型',role.bodyType],
      ['体重/罩杯',`${firstKnown(rec(role.exam.基础数据).体重,'未知')} / ${firstKnown(rec(role.exam.围度体态).罩杯,'未知')}`],
      ['胸型/臀型',`${firstKnown(rec(role.exam.围度体态).胸型,'未知')} / ${firstKnown(rec(role.exam.围度体态).臀型,'未知')}`],
      ['当前认知',role.cognition],
      ['提示','精确身体数据需要体检、测量、报告或本人明确透露']
    ]);
  }else if(state.roleTab==='exam'){
    inner=renderExam({
      hasRecord: exam.hasRecord,
      source: exam.source,
      confidence: exam.confidence,
      updatedAt: exam.updatedAt,
      基础数据: rec(role.exam.基础数据),
      围度体态: rec(role.exam.围度体态),
      私密确认: rec(role.exam.私密确认)
    });
  }else if(state.roleTab==='relation'){
    inner=grid([
      ['性经验',role.sexExperience],
      ['性癖倾向',role.kink],
      ['性欲状态',role.libido],
      ['性开放尺度',role.openness],
      ['肉体关系',role.physicalRelation],
      ['近期情绪',role.recentMood]
    ]);
  }else{
    inner=grid([
      ['伴侣/配偶',social.伴侣配偶],
      ['家庭关系',social.家庭关系],
      ['工作圈',social.工作圈],
      ['熟人圈',social.熟人圈],
      ['最近牵连事件',social.最近牵连事件],
      ['可信度',social.可信度]
    ]);
  }
  return `<div class="card">
    <button class="btn" data-back>返回角色列表</button>
    <h3>${esc(role.name)}</h3>
    <div class="small">${esc(role.publicIdentity)} · ${role.inScene?'当前在场':'当前不在场'}</div>
    <div class="subtabs">${tabs.map(([id,label])=>`<button class="subtab ${state.roleTab===id?'active':''}" data-rtab="${id}">${label}</button>`).join('')}</div>
    ${inner}
  </div>`;
}
function renderRoles(data){
  const roles=slots.map(slot=>normalizeRole(data,slot)).filter(r=>r.built);
  if(state.role){
    const found=roles.find(r=>r.slot===state.role);
    if(found) return renderRoleDetail(found);
    state.role=null;
  }
  if(!roles.length) return `<div class="card"><div class="empty">当前没有已建档角色。</div></div>`;
  return `<div class="list">${roles.map(role=>`
    <div class="role">
      <div class="top">
        <div>
          <div class="name">${esc(role.name)}</div>
          <div class="small">${esc(role.publicIdentity)}</div>
        </div>
        <span class="tag">${role.inScene?'在场':'离场'}</span>
      </div>
      ${grid([
        ['性格底色',role.personality],
        ['感情深度',role.emotionalRelation],
        ['最近线下互动',role.recentOffline],
        ['最近网络互动',role.recentOnline]
      ])}
      <div class="actions">
        <button class="btn" data-role="${role.slot}">查看详细档案</button>
        <button class="btn" data-fill="给${esc(role.name)}发微信：">私信</button>
      </div>
    </div>`).join('')}</div>`;
}
function renderSocial(data){
  const contacts=Object.entries(rec(get(data,'联系人薄'))).filter(([,c])=>!unknownish(rec(c).昵称));
  return `<div class="card"><h3>论坛与社交通知</h3>${grid([
    ['论坛等级',get(data,'主角.论坛等级')],
    ['论坛声望',get(data,'主角.论坛声望')],
    ['论坛阶段',get(data,'论坛状态.阶段')],
    ['最近热度',get(data,'论坛状态.最近热度')],
    ['未读私信',get(data,'论坛状态.未读私信')],
    ['论坛影响',get(data,'论坛状态.论坛影响')],
    ['微信未读',get(data,'社交状态.微信未读')],
    ['最近聊天对象',get(data,'社交状态.最近聊天对象')]
  ])}</div>
  <div class="card"><h3>联系人薄</h3>${contacts.length?`<div class="list">${contacts.map(([,c])=>`
    <div class="role">
      <div class="top">
        <div>
          <div class="name">${esc(c.昵称)}</div>
          <div class="small">${esc(firstKnown(c.来源,'未知'))} / ${esc(firstKnown(c.关系,'未知'))}</div>
        </div>
        <span class="tag">${boolish(c.是否活跃)?'活跃':'低频'}</span>
      </div>
      <div class="small">${esc(firstKnown(c.最近互动,'暂无'))}</div>
    </div>`).join('')}</div>`:'<div class="empty">暂无轻联系人。</div>'}</div>`;
}
function render(){
  const data=vars();
  document.getElementById('meta').innerHTML=`${esc(firstKnown(get(data,'世界.完整时间'),'未同步'))}<br>${esc(firstKnown(get(data,'世界.当前地点'),'未知地点'))}`;
  document.getElementById('focus').textContent=`当前焦点：${firstKnown(get(data,'世界.当前焦点'),'正在等待变量载入')}`;
  document.querySelectorAll('.tab').forEach(btn=>btn.classList.toggle('active',btn.dataset.tab===state.tab));
  document.querySelectorAll('.panel').forEach(panel=>panel.classList.toggle('active',panel.dataset.panel===state.tab));
  const html={
    overview:renderOverview(data),
    onsite:renderOnsite(data),
    roles:renderRoles(data),
    social:renderSocial(data)
  }[state.tab];
  document.querySelector(`[data-panel="${state.tab}"]`).innerHTML=html;
}
document.addEventListener('click',e=>{
  const tab=e.target.closest('[data-tab]');
  if(tab){ state.tab=tab.dataset.tab; render(); return; }
  const role=e.target.closest('[data-role]');
  if(role){ state.role=role.dataset.role; state.roleTab='summary'; state.examTab='overview'; render(); return; }
  const back=e.target.closest('[data-back]');
  if(back){ state.role=null; render(); return; }
  const rtab=e.target.closest('[data-rtab]');
  if(rtab){ state.roleTab=rtab.dataset.rtab; render(); return; }
  const etab=e.target.closest('[data-exam-tab]');
  if(etab){ state.examTab=etab.dataset.examTab; render(); return; }
  const fill=e.target.closest('[data-fill]');
  if(fill){ setInput(fill.dataset.fill||''); }
});
render();
setInterval(render,1500);
})();
</script>
