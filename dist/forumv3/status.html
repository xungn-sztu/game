<meta charset="utf-8">
<style>
body{margin:0;padding:12px;background:transparent;color:#eee;font-family:"Segoe UI","Microsoft YaHei",sans-serif}
.fv3{max-width:860px;margin:0 auto;background:#141111;border:1px solid rgba(190,38,47,.35);border-radius:18px;overflow:hidden;box-shadow:0 18px 48px rgba(0,0,0,.38)}
.head{display:flex;justify-content:space-between;gap:14px;padding:16px 18px;background:#201919;border-bottom:1px solid rgba(190,38,47,.28)}
.title{font-size:22px;font-weight:900}.sub{font-size:12px;color:#c4b5b5;line-height:1.7}.meta{text-align:right;color:#e5d1d1;font-size:13px;line-height:1.55}
.focus{margin:14px 16px 10px;border:1px solid rgba(190,38,47,.32);border-radius:14px;background:#251315;color:#fff;padding:12px 14px;font-weight:700}
.tabs,.subtabs,.exam-tabs{display:flex;gap:8px;flex-wrap:wrap;padding:0 16px 12px}.subtabs,.exam-tabs{padding:0 0 12px}.tab,.subtab,.exam-tab,.btn{border:1px solid rgba(190,38,47,.4);background:#281518;color:#f2d6d6;border-radius:999px;padding:8px 13px;cursor:pointer}.subtab,.exam-tab{background:#181616;padding:7px 11px}.tab.active,.subtab.active,.exam-tab.active{background:#9b2631;color:#fff}
.content{padding:0 16px 16px}.panel{display:none}.panel.active{display:block}.card{background:#1b1818;border:1px solid rgba(190,38,47,.22);border-radius:14px;padding:14px;margin-bottom:12px}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.kv{background:#151313;border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:11px}.k{font-size:12px;color:#b8a6a6;margin-bottom:6px}.v{font-size:15px;color:#fff;line-height:1.55;word-break:break-word}.empty{border:1px dashed rgba(190,38,47,.24);border-radius:12px;text-align:center;color:#aaa;padding:22px}.list{display:grid;gap:10px}.role{border:1px solid rgba(190,38,47,.22);border-radius:14px;background:#151313;padding:13px}.top{display:flex;justify-content:space-between;gap:10px}.name{font-weight:900;font-size:16px}.tag{font-size:12px;color:#eac0c0;border:1px solid rgba(190,38,47,.32);border-radius:999px;padding:2px 8px}.small{font-size:12px;color:#aaa;line-height:1.6}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.btn{background:#1c1717;color:#e7cccc}
@media(max-width:680px){.grid{grid-template-columns:1fr}.head{display:block}.meta{text-align:left;margin-top:8px}}
</style>
<div class="fv3">
  <div class="head">
    <div><div class="title">论坛v3</div><div class="sub">状态栏只显示当前硬事实、在场观察、已知角色和社交通知；旧记忆只作线索，不覆盖当前状态。</div></div>
    <div class="meta" id="meta">未同步</div>
  </div>
  <div class="focus" id="focus">正在等待变量载入</div>
  <div class="tabs">
    <button class="tab active" data-tab="overview">概览</button>
    <button class="tab" data-tab="onsite">在场</button>
    <button class="tab" data-tab="roles">角色</button>
    <button class="tab" data-tab="social">社交</button>
  </div>
  <div class="content">
    <div class="panel active" data-panel="overview"></div>
    <div class="panel" data-panel="onsite"></div>
    <div class="panel" data-panel="roles"></div>
    <div class="panel" data-panel="social"></div>
  </div>
</div>
<script>
(function(){
const state={tab:'overview',role:null,roleTab:'summary',examTab:'overview'};
const slots=['档案1','档案2','档案3','档案4','档案5','档案6','档案7','档案8'];
function esc(v){return String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function norm(v){if(v&&typeof v==='object')return v;if(typeof v==='string'){try{return JSON.parse(v)}catch(e){}}return{}}
function vars(){try{if(window.getAllVariables)return norm(window.getAllVariables().stat_data)}catch(e){}try{const st=window.SillyTavern||(window.parent&&window.parent.SillyTavern);const ctx=st&&st.getContext?st.getContext():null;return norm(ctx?.variables?.local?.get?.('stat_data')||ctx?.chatMetadata?.variables?.stat_data||ctx?.chatMetadata?.stat_data)}catch(e){}return{}}
function rec(v){return v&&typeof v==='object'&&!Array.isArray(v)?v:{}}
function val(v,f='未知'){return v==null||v===''?f:v}
function get(o,p,f='未知'){try{const v=p.split('.').reduce((c,k)=>c&&Object.prototype.hasOwnProperty.call(c,k)?c[k]:undefined,o);return val(v,f)}catch(e){return f}}
function kv(k,v){return `<div class="kv"><div class="k">${esc(k)}</div><div class="v">${esc(val(v))}</div></div>`}
function grid(rows){return `<div class="grid">${rows.map(([k,v])=>kv(k,v)).join('')}</div>`}
function activeRoles(data){return slots.map(s=>({slot:s,idx:rec(get(data,`角色索引.${s}`,{})),profile:rec(get(data,`女角色档案.${s}`,{})),exam:rec(get(data,`体检记录.${s}`,{})),social:rec(get(data,`社会关系网.${s}`,{}))})).filter(r=>r.profile.是否已建档||r.idx.是否已建档||r.profile.角色名||r.idx.角色名)}
function hostDoc(){try{return window.parent&&window.parent.document?window.parent.document:document}catch(e){return document}}
function setInput(text){try{const doc=hostDoc();const t=doc.querySelector('#send_textarea')||doc.querySelector('textarea[name="message"]')||doc.querySelector('textarea');if(!t)return;const desc=Object.getOwnPropertyDescriptor((t.ownerDocument.defaultView||window).HTMLTextAreaElement.prototype,'value');if(desc&&desc.set)desc.set.call(t,text);else t.value=text;t.dispatchEvent(new Event('input',{bubbles:true,cancelable:true}));t.dispatchEvent(new Event('change',{bubbles:true}));t.focus()}catch(e){}}
function renderOverview(data){return `<div class="card"><h3>当前处境</h3>${grid([['时间',get(data,'世界.完整时间')],['地点',get(data,'世界.当前地点')],['当前状态',get(data,'世界.当前状态')],['当前焦点',get(data,'世界.当前焦点')]])}</div><div class="card"><h3>身上资源</h3>${grid([['身上的钱',get(data,'主角.身上的钱')],['手机状态',get(data,'主角.手机状态')],['论坛身份',`${get(data,'主角.论坛等级')} / ${get(data,'主角.论坛声望')}`],['最近动向',get(data,'世界.最近动向')]])}</div>`}
function renderOnsite(data){const raw=get(data,'视线内对象',{});const onsite=Array.isArray(raw)?raw:Object.values(rec(raw)).filter(Boolean);if(!onsite.length)return '<div class="card"><div class="empty">当前视线内没有可观察角色。</div></div>';return `<div class="list">${onsite.map(o=>`<div class="role"><div class="top"><div><div class="name">${esc(o.角色名||'未知角色')}</div><div class="small">${esc(o.当前观察||'当前只记录可观察信息')}</div></div><span class="tag">${esc(o.可感知来源||'亲眼所见')}</span></div>${grid([['发型',o.发型],['面部',o.面部],['上装',o.上装],['下装',o.下装],['内衣可见情况',o.内衣可见情况],['动作姿态',o.动作姿态]])}</div>`).join('')}</div>`}
function renderExam(exam){
  const base=rec(exam.基础数据), measure=rec(exam.围度体态), priv=rec(exam.私密确认);
  const tabs=[['overview','概况'],['base','基础数据'],['measure','围度体态'],['private','私密确认']];
  let body='';
  if(state.examTab==='overview') body=grid([['是否有记录',exam.是否有记录?'是':'否'],['最近体检来源',exam.最近体检来源],['可信度',exam.可信度],['最近更新时间',exam.最近更新时间]]);
  else if(state.examTab==='base') body=grid([['身高',base.身高],['体重',base.体重],['BMI',base.BMI],['体脂率',base.体脂率]]);
  else if(state.examTab==='measure') body=grid([['胸围',measure.胸围],['腰围',measure.腰围],['臀围',measure.臀围],['大腿围',measure.大腿围],['罩杯',measure.罩杯],['胸型',measure.胸型],['臀型',measure.臀型]]);
  else {
    const fertility=rec(priv.生育与避孕), cycle=rec(priv.生理状态), vulva=rec(priv.阴部确认), anal=rec(priv.后庭确认);
    body=`${grid([['确认状态',priv.状态],['确认来源',priv.确认来源],['确认时间',priv.确认时间],['可信度',priv.可信度]])}<div class="card"><h3>生育与避孕</h3>${grid([['避孕方式',fertility.避孕方式],['风险状态',fertility.风险状态],['最近确认',fertility.最近确认],['是否需要复查',fertility.是否需要复查]])}</div><div class="card"><h3>生理状态</h3>${grid([['周期规律',cycle.周期规律],['近期周期',cycle.近期周期],['妇科健康',cycle.妇科健康],['近期不适',cycle.近期不适]])}</div><div class="card"><h3>阴部确认</h3>${grid([['颜色',vulva.颜色],['毛发管理',vulva.毛发管理],['紧致度',vulva.紧致度],['湿润度',vulva.湿润度],['敏感度',vulva.敏感度],['入口状态',vulva.入口状态],['近期痕迹',vulva.近期痕迹],['恢复情况',vulva.恢复情况]])}</div><div class="card"><h3>后庭确认</h3>${grid([['颜色',anal.颜色],['紧致度',anal.紧致度],['湿润度',anal.湿润度],['敏感度',anal.敏感度],['入口状态',anal.入口状态],['近期痕迹',anal.近期痕迹],['恢复情况',anal.恢复情况]])}</div>`;
  }
  return `<div class="exam-tabs">${tabs.map(([id,label])=>`<button class="exam-tab ${state.examTab===id?'active':''}" data-exam-tab="${id}">${label}</button>`).join('')}</div>${body}`;
}
function detail(role){const p=role.profile, e=role.exam, s=role.social;const tabs=['summary','body','exam','relation','social'];const labels={summary:'摘要',body:'身体',exam:'体检',relation:'性与关系',social:'社会关系'};let inner='';if(state.roleTab==='summary')inner=grid([['职业',p.职业],['婚姻状况',p.婚姻状况],['性格底色',p.性格底色],['认识途径',p.认识途径],['感情关系',p.感情关系],['最近更新',p.最近更新]]);else if(state.roleTab==='body'){const base=rec(e.基础数据), measure=rec(e.围度体态);inner=grid([['年龄',p.年龄],['外貌类型',p.外貌类型],['身高',p.身高],['身材类型',p.身材类型],['体重 / 罩杯',`${val(base.体重)} / ${val(measure.罩杯)}`],['胸型 / 臀型',`${val(measure.胸型)} / ${val(measure.臀型)}`],['当前认知',p.当前认知],['提示','精确身体数据需要体检、测量、报告或本人明确透露']]);}else if(state.roleTab==='exam')inner=renderExam(e);else if(state.roleTab==='relation')inner=grid([['性经验',p.性经验],['性癖倾向',p.性癖倾向],['性欲状态',p.性欲状态],['性开放尺度',p.性开放尺度],['肉体关系',p.肉体关系],['近期情绪',p.近期情绪]]);else inner=grid([['伴侣/配偶',s.伴侣配偶],['家庭关系',s.家庭关系],['工作圈',s.工作圈],['熟人圈',s.熟人圈],['最近牵连事件',s.最近牵连事件],['可信度',s.可信度]]);return `<div class="card"><button class="btn" data-back>返回角色列表</button><h3>${esc(p.角色名||role.idx.角色名||role.slot)}</h3><div class="subtabs">${tabs.map(t=>`<button class="subtab ${state.roleTab===t?'active':''}" data-rtab="${t}">${labels[t]}</button>`).join('')}</div>${inner}</div>`}
function renderRoles(data){const roles=activeRoles(data);if(state.role){const r=roles.find(x=>x.slot===state.role);if(r)return detail(r);state.role=null}if(!roles.length)return '<div class="card"><div class="empty">当前没有已建档角色。</div></div>';return `<div class="list">${roles.map(r=>{const p=r.profile, name=p.角色名||r.idx.角色名||r.slot;return `<div class="role"><div class="top"><div><div class="name">${esc(name)}</div><div class="small">${esc(p.公开身份||r.idx.公开身份||'身份未知')}</div></div><span class="tag">${p.当前是否在场||r.idx.当前是否在场?'在场':'不在场'}</span></div>${grid([['性格底色',p.性格底色],['感情关系',p.感情关系],['最近线下互动',p.最近线下互动],['最近网络互动',p.最近网络互动]])}<div class="actions"><button class="btn" data-role="${r.slot}">查看详细档案</button><button class="btn" data-fill="给${esc(name)}发微信：">微信</button></div></div>`}).join('')}</div>`}
function renderSocial(data){const contacts=Object.entries(rec(get(data,'联系人薄',{}))).filter(([,c])=>c&&c.昵称);return `<div class="card"><h3>论坛与社交通知</h3>${grid([['论坛等级',get(data,'主角.论坛等级')],['论坛声望',get(data,'主角.论坛声望')],['论坛阶段',get(data,'论坛状态.阶段')],['最近热度',get(data,'论坛状态.最近热度')],['未读私信',get(data,'论坛状态.未读私信')],['论坛影响',get(data,'论坛状态.论坛影响')],['微信未读',get(data,'社交状态.微信未读')],['最近聊天对象',get(data,'社交状态.最近聊天对象')]])}</div><div class="card"><h3>联系人薄</h3>${contacts.length?`<div class="list">${contacts.map(([slot,c])=>`<div class="role"><div class="top"><div><div class="name">${esc(c.昵称)}</div><div class="small">${esc(c.来源)} / ${esc(c.关系)}</div></div><span class="tag">${c.是否活跃?'活跃':'低频'}</span></div><div class="small">${esc(c.最近互动||'暂无')}</div></div>`).join('')}</div>`:'<div class="empty">暂无轻联系人。</div>'}</div>`}
function render(){const data=vars();document.getElementById('meta').innerHTML=`${esc(get(data,'世界.完整时间','未同步'))}<br>${esc(get(data,'世界.当前地点','未知地点'))}`;document.getElementById('focus').textContent='当前焦点：'+get(data,'世界.当前焦点','正在等待变量载入');document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===state.tab));document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.dataset.panel===state.tab));const html={overview:renderOverview(data),onsite:renderOnsite(data),roles:renderRoles(data),social:renderSocial(data)}[state.tab];document.querySelector(`[data-panel="${state.tab}"]`).innerHTML=html}
document.addEventListener('click',e=>{const tab=e.target.closest('[data-tab]');if(tab){state.tab=tab.dataset.tab;render();return}const role=e.target.closest('[data-role]');if(role){state.role=role.dataset.role;state.roleTab='summary';state.examTab='overview';render();return}const rtab=e.target.closest('[data-rtab]');if(rtab){state.roleTab=rtab.dataset.rtab;render();return}const etab=e.target.closest('[data-exam-tab]');if(etab){state.examTab=etab.dataset.examTab;render();return}if(e.target.closest('[data-back]')){state.role=null;render();return}const fill=e.target.closest('[data-fill]');if(fill)setInput(fill.dataset.fill)});
render();setInterval(render,1500);
})();
</script>
