<div class="wrap"><div class="head"><div class="title">帖子详情</div><div class="meta">帖子是记录和引流，不等于现实事实。</div></div><div class="content" id="app"></div></div>
<script>
(function(){function doc(){try{return window.parent&&window.parent.document?window.parent.document:document}catch(e){return document}}function fill(v){const t=doc().querySelector('#send_textarea')||doc().querySelector('textarea');if(!t)return;t.value=v;t.dispatchEvent(new Event('input',{bubbles:true,cancelable:true}));t.focus()}document.getElementById('app').innerHTML=`<div class="post"><div class="title">昨晚那条微信后续，别催，越急越假</div><div class="meta">记录区 · 楼主：夜里不睡 · 热度：升温 · 回复 28</div><div class="body">她没有直接答应，也没有把话说死。真正有意思的是，她撤回了一句消息，过了几分钟又换了个更安全的说法。</div><p><button data-fill="回复帖子：">回复</button><button data-fill="私信楼主：">私信楼主</button><button data-fill="发布后续记录帖：">发后续</button></p></div><div class="reply"><b>#2 打假党</b><div class="meta">没截图先当故事看，但这个撤回细节挺像真的。</div></div><div class="reply"><b>#3 灰猫</b><div class="meta">楼主别写太细，小心她自己刷到。</div></div><div class="reply"><b>#4 路过女号</b><div class="meta">有些话撤回，不一定是不想说，可能是怕你太当真。</div></div>`;document.addEventListener('click',e=>{const b=e.target.closest('[data-fill]');if(b)fill(b.dataset.fill)})})();
</script>
