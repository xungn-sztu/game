<meta charset="utf-8">
<style>
body{margin:0;padding:14px;background:transparent;color:#e9edf2;font-family:"Segoe UI","Microsoft YaHei",sans-serif}
.wrap{max-width:720px;margin:0 auto;border:1px solid rgba(185,42,48,.36);border-radius:18px;overflow:hidden;background:#0b0f14;box-shadow:0 18px 46px rgba(0,0,0,.42)}
.head{padding:14px 16px;text-align:center;background:#111822;border-bottom:1px solid rgba(255,255,255,.08);font-weight:800}
.body{padding:18px;background:radial-gradient(circle at top left,rgba(115,27,34,.24),transparent 34%),#0c1117;color:#b8c0cc;line-height:1.8}
.bar{display:flex;gap:8px;padding:11px 12px;background:#10151c;border-top:1px solid rgba(255,255,255,.08)}
.input{flex:1;border:1px solid rgba(255,255,255,.12);background:#0b0f14;color:#aeb7c4;border-radius:999px;padding:9px 12px;text-align:left;cursor:pointer}
.btn{border:1px solid rgba(185,42,48,.62);background:#7f2029;color:#fff;border-radius:999px;padding:9px 13px;cursor:pointer;font-weight:700}
</style>
<div class="wrap">
  <div class="head">微信聊天</div>
  <div class="body">选择一个联系人，或直接在输入栏里写“打开和某人的微信聊天”。聊天内容会以深色微信/群聊式气泡显示。</div>
  <div class="bar">
    <button class="input" data-fill="打开微信聊天：">打开微信聊天：</button>
    <button class="btn" data-fill="打开微信聊天：">填入</button>
  </div>
</div>
<script>
(function(){
  function doc(){try{return window.parent&&window.parent.document?window.parent.document:document}catch(e){return document}}
  function fill(v){const d=doc();const t=d.querySelector('#send_textarea')||d.querySelector('textarea[name="message"]')||d.querySelector('textarea');if(!t)return;const view=t.ownerDocument.defaultView||window;const desc=Object.getOwnPropertyDescriptor(view.HTMLTextAreaElement.prototype,'value');if(desc&&desc.set)desc.set.call(t,v);else t.value=v;t.dispatchEvent(new Event('input',{bubbles:true,cancelable:true}));t.dispatchEvent(new Event('change',{bubbles:true}));t.focus()}
  document.addEventListener('click',e=>{const b=e.target.closest('[data-fill]');if(b)fill(b.dataset.fill||'')});
})();
</script>
