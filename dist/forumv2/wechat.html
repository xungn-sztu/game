<meta charset="utf-8">
<style>
body{margin:0;padding:14px;background:transparent;color:#e9efe6;font-family:"Segoe UI","Microsoft YaHei",sans-serif}.phone{max-width:430px;margin:0 auto;background:#ededed;color:#111;border-radius:24px;overflow:hidden;border:1px solid #ccc;box-shadow:0 18px 42px rgba(0,0,0,.35)}.top{background:#f7f7f7;padding:12px;text-align:center;font-weight:800;border-bottom:1px solid #ddd}.chat{padding:14px;display:grid;gap:10px;background:#e5e5e5}.b{max-width:78%;padding:9px 11px;border-radius:10px;background:#fff;line-height:1.55}.m{justify-self:end;background:#95ec69}.sys{text-align:center;color:#888;font-size:12px}.bar{padding:10px;background:#f7f7f7;border-top:1px solid #ddd;display:flex;gap:8px;flex-wrap:wrap}button{border:1px solid #ccc;background:#fff;border-radius:999px;padding:7px 10px;cursor:pointer}
</style>
<div class="phone"><div class="top">微信聊天</div><div class="chat"><div class="sys">对方正在输入...</div><div class="b">你刚才那条消息，我看见了。</div><div class="b">但你别把论坛里那套直接搬到微信里。</div><div class="b m">那我换一种说法。</div><div class="sys">对方撤回了一条消息</div></div><div class="bar"><button data-fill="回复微信：">回复</button><button data-fill="发一条语音：">语音</button><button data-fill="约她线下见面：">约见</button><button data-fill="让她完成一个很轻的线上任务：">轻任务</button></div></div>
<script>(function(){function d(){try{return window.parent&&window.parent.document?window.parent.document:document}catch(e){return document}}function f(v){const doc=d();const t=doc.querySelector('#send_textarea')||doc.querySelector('textarea[name="message"]')||doc.querySelector('textarea');if(!t)return;const proto=(t.ownerDocument.defaultView||window).HTMLTextAreaElement.prototype;const desc=Object.getOwnPropertyDescriptor(proto,'value');if(desc&&desc.set)desc.set.call(t,v);else t.value=v;t.dispatchEvent(new Event('input',{bubbles:true,cancelable:true}));t.dispatchEvent(new Event('change',{bubbles:true}));t.focus()}document.addEventListener('click',e=>{const b=e.target.closest('[data-fill]');if(b)f(b.dataset.fill)})})();</script>
