<meta charset="utf-8">
<style>
body{margin:0;padding:12px;background:transparent;color:#eee;font-family:"Segoe UI","Microsoft YaHei",sans-serif}.wrap{max-width:760px;margin:0 auto;background:#151515;border:1px solid rgba(224,49,49,.25);border-radius:16px;overflow:hidden}.head{background:#202020;padding:12px 14px;border-bottom:1px solid rgba(224,49,49,.22);display:flex;justify-content:space-between}.title{font-size:18px;font-weight:800}.meta{color:#aaa;font-size:12px;text-align:right}.tabs{display:flex;gap:8px;padding:10px 12px;flex-wrap:wrap}.tab{border:1px solid rgba(224,49,49,.38);background:#2a1719;color:#f5d6d6;border-radius:999px;padding:7px 11px;cursor:pointer}.content{padding:12px}.card{background:#202020;border:1px solid rgba(224,49,49,.22);border-radius:12px;padding:12px;margin-bottom:10px}.muted{color:#aaa;font-size:12px;line-height:1.7}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}@media(max-width:640px){.grid{grid-template-columns:1fr}}

<div class="wrap"><div class="head"><div><div class="title">论坛v2</div><div class="muted">线下为主，微信/社交承接，论坛记录与引流</div></div><div class="meta" id="meta">未同步<br>现实中</div></div><div class="tabs"><button class="tab" data-fill="打开论坛主页">论坛</button><button class="tab" data-fill="打开微信聊天">微信</button><button class="tab" data-fill="查看朋友圈">朋友圈</button><button class="tab" data-fill="发布记录帖：">发帖</button></div><div class="content"><div class="card"><b>当前节奏</b><div class="grid"><div><div class="muted">线下现实</div><div>60%</div></div><div><div class="muted">微信/社交</div><div>25%</div></div><div><div class="muted">论坛</div><div>15%</div></div><div><div class="muted">状态</div><div id="sync">等待变量</div></div></div></div><div class="card"><b>快捷入口</b><div class="muted">论坛用于记录、热度、评论和引流；网调与私聊主要走微信式聊天框。</div></div></div></div>
<script>
(function(){function d(){try{return window.parent&&window.parent.document?window.parent.document:document}catch(e){return document}}function f(v){const doc=d();const t=doc.querySelector('#send_textarea')||doc.querySelector('textarea[name="message"]')||doc.querySelector('textarea');if(!t)return;const proto=(t.ownerDocument.defaultView||window).HTMLTextAreaElement.prototype;const desc=Object.getOwnPropertyDescriptor(proto,'value');if(desc&&desc.set)desc.set.call(t,v);else t.value=v;t.dispatchEvent(new Event('input',{bubbles:true,cancelable:true}));t.dispatchEvent(new Event('change',{bubbles:true}));t.focus()}function norm(v){if(v&&typeof v==='object')return v;if(typeof v==='string')try{return JSON.parse(v)}catch(e){}return {}}function vars(){try{if(window.getAllVariables)return norm(window.getAllVariables().stat_data)}catch(e){}try{const c=(window.SillyTavern||window.parent.SillyTavern).getContext();if(c&&c.variables&&c.variables.local)return norm(c.variables.local.get('stat_data'))}catch(e){}return {}}function render(){const s=vars();document.getElementById('sync').textContent=Object.keys(s).length?'已同步':'等待变量';}document.addEventListener('click',e=>{const b=e.target.closest('[data-fill]');if(b)f(b.dataset.fill)});render();setInterval(render,2500)})();
</script>
