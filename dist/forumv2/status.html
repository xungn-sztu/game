<meta charset="utf-8">
<style>
body{margin:0;padding:12px;background:transparent;color:#eee;font-family:"Segoe UI","Microsoft YaHei",sans-serif}
.wrap{max-width:780px;margin:0 auto;background:#151515;border:1px solid rgba(224,49,49,.25);border-radius:18px;overflow:hidden}
.head{background:#202020;padding:14px 16px;border-bottom:1px solid rgba(224,49,49,.22);display:flex;justify-content:space-between;gap:12px}
.title{font-size:18px;font-weight:800}.sub{color:#aaa;font-size:12px;line-height:1.7}.meta{color:#b9b9b9;font-size:12px;text-align:right;line-height:1.7}
.reminder{margin:12px;border:1px solid rgba(224,49,49,.22);background:#211516;border-radius:14px;padding:10px 12px;color:#f2dede;font-size:13px;line-height:1.7}
.tabs,.detail-tabs,.exam-tabs{display:flex;gap:8px;flex-wrap:wrap}.tabs{padding:0 12px 12px}
.tab,.detail-tab,.exam-tab{border:1px solid rgba(224,49,49,.34);background:#2a1719;color:#f5d6d6;border-radius:999px;padding:8px 12px;cursor:pointer}
.detail-tab,.exam-tab{background:#181818;color:#ddd;padding:6px 10px}.tab.active,.detail-tab.active,.exam-tab.active{background:#7b2428;color:#fff;border-color:#bb5056}
.content{padding:0 12px 12px}.panel{display:none}.panel.active{display:block}
.card{background:#202020;border:1px solid rgba(224,49,49,.22);border-radius:14px;padding:12px;margin-bottom:10px}.card h3{margin:0 0 10px;font-size:16px}
.muted{color:#aaa;font-size:12px;line-height:1.7}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.mini-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
.kv{background:#191919;border:1px solid rgba(224,49,49,.16);border-radius:12px;padding:10px}.k{font-size:12px;color:#9e9e9e;margin-bottom:5px}.v{font-size:15px;color:#f0f0f0;line-height:1.5;word-break:break-word}
.list{display:flex;flex-direction:column;gap:10px}.role-card{background:#191919;border:1px solid rgba(224,49,49,.16);border-radius:14px;padding:12px}
.role-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.name{font-size:16px;font-weight:800}.tag{display:inline-flex;align-items:center;border:1px solid rgba(224,49,49,.28);border-radius:999px;padding:2px 8px;font-size:12px;color:#f1c4c4}
.row{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:10px}.actions,.quick-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.btn{border:1px solid rgba(224,49,49,.32);background:#2a1719;color:#f5d6d6;border-radius:999px;padding:8px 12px;cursor:pointer}.btn.secondary{background:#1c1c1c;color:#ddd;border-color:rgba(255,255,255,.14)}
.empty{padding:18px 12px;color:#a9a9a9;text-align:center;border:1px dashed rgba(224,49,49,.18);border-radius:12px}.source{font-size:11px;color:#c89b9b;margin-top:4px}
@media (max-width:640px){.grid,.row,.mini-grid{grid-template-columns:1fr}}
</style>
<div class="wrap">
  <div class="head">
    <div><div class="title">论坛v2</div><div class="sub">状态栏只负责当前认知、在场观察、已知角色和社交通知，不承担读心或全知档案。</div></div>
    <div class="meta" id="meta">未同步<br>现实中</div>
  </div>
  <div class="reminder" id="reminder">正在等待变量载入。</div>
  <div class="tabs">
    <button class="tab active" data-tab="overview">概览</button>
    <button class="tab" data-tab="onsite">在场</button>
    <button class="tab" data-tab="roles">角色</button>
    <button class="tab" data-tab="social">社交</button>
  </div>
  <div class="content">
    <div class="panel active" data-panel="overview"></div>
    <div class="panel" data-panel="onsite"></div>
    <div class="panel" data-panel="roles"></div>
    <div class="panel" data-panel="social"></div>
  </div>
</div>
<script>
(function(){
  const state = { activeTab: 'overview', selectedRole: null, selectedRoleTab: 'summary', selectedExamTab: 'overview' };
  const slotNames = ['档案1','档案2','档案3','档案4'];
  const unknown = '未知';
  function hostDocument(){ try { return window.parent && window.parent.document ? window.parent.document : document; } catch(e){ return document; } }
  function fillInput(text){
    const doc = hostDocument();
    const textarea = doc.querySelector('#send_textarea') || doc.querySelector('textarea[name="message"]') || doc.querySelector('textarea');
    if(!textarea) return false;
    const proto = (textarea.ownerDocument.defaultView || window).HTMLTextAreaElement.prototype;
    const desc = Object.getOwnPropertyDescriptor(proto, 'value');
    if(desc && desc.set) desc.set.call(textarea, text); else textarea.value = text;
    textarea.dispatchEvent(new Event('input', {bubbles:true,cancelable:true}));
    textarea.dispatchEvent(new Event('change', {bubbles:true}));
    textarea.focus();
    return true;
  }
  function normalize(value){ if(value && typeof value === 'object') return value; if(typeof value === 'string'){ try{return JSON.parse(value)}catch(e){} } return {}; }
  function allVars(){
    try { if(window.getAllVariables) return normalize(window.getAllVariables().stat_data); } catch(e){}
    try {
      const ST = window.SillyTavern || (window.parent && window.parent.SillyTavern);
      const ctx = ST && ST.getContext ? ST.getContext() : null;
      const raw = ctx?.variables?.local?.get?.('stat_data') || ctx?.chatMetadata?.variables?.stat_data || ctx?.chatMetadata?.stat_data;
      return normalize(raw);
    } catch(e){}
    return {};
  }
  function get(obj,path,fallback=''){ try{ const value = path.split('.').reduce((cur,part)=>cur && Object.prototype.hasOwnProperty.call(cur,part) ? cur[part] : undefined, obj); return value == null ? fallback : value; }catch(e){ return fallback; } }
  function rec(v){ return v && typeof v === 'object' && !Array.isArray(v) ? v : {}; }
  function arr(v){ return Array.isArray(v) ? v : (typeof v === 'string' && v.trim() ? [v] : []); }
  function val(v,fallback=unknown){ if(v == null) return fallback; if(typeof v === 'string') return v.trim() || fallback; if(typeof v === 'number' || typeof v === 'boolean') return String(v); return fallback; }
  function esc(v){ return String(v ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
  function sourceMeta(profile,key){
    const meta = get(profile, `认知来源.${key}`, null);
    if(!meta) return '';
    if(typeof meta === 'string') return `来源：${meta}`;
    return `来源：${meta.信息来源 || '未知'} / ${meta.认知状态 || '未证实'}`;
  }
  function metaHtml(text){ return text ? `<div class="source">${esc(text)}</div>` : ''; }
  function kv(k,v,meta=''){ return `<div class="kv"><div class="k">${esc(k)}</div><div class="v">${esc(val(v))}</div>${metaHtml(meta)}</div>`; }
  function deriveOverview(data){
    const main = rec(get(data,'主角简档',{})); const social = rec(get(data,'社交状态',{})); const forum = rec(get(data,'论坛状态',{}));
    return {
      time: val(get(data,'世界.时间','未同步')), place: val(get(data,'世界.地点','未知地点')), money: val(main.身上的钱),
      currentState: val(main.当前状态, Object.keys(rec(get(data,'视线内对象',{}))).length ? '环境中有人在场' : '当前无人进入视线'),
      phoneState: val(main.手机状态, Number(social.微信未读||0)>0 ? `微信有 ${social.微信未读} 条未读` : '手机安静'),
      recentMovement: val(main.最近动向 || social.最近聊天对象 || forum.最近记录帖, '暂无明显变化'),
      focus: val(main.当前焦点 || main.当前目标, '等待玩家下一步动作')
    };
  }
  function renderOverview(data){
    const o = deriveOverview(data);
    return `<div class="card"><h3>当前处境</h3><div class="grid">${kv('时间',o.time)}${kv('地点',o.place)}${kv('当前状态',o.currentState)}${kv('当前焦点',o.focus)}</div></div>
      <div class="card"><h3>身上资源</h3><div class="grid">${kv('身上的钱',o.money)}${kv('手机状态',o.phoneState)}</div></div>
      <div class="card"><h3>眼前变化</h3><div class="grid">${kv('最近动向',o.recentMovement)}${kv('当前提醒',`微信未读 ${val(get(data,'社交状态.微信未读',0),'0')} · 论坛私信 ${val(get(data,'论坛状态.未读私信',0),'0')} · 在场角色 ${Object.keys(rec(get(data,'视线内对象',{}))).length}`)}</div></div>`;
  }
  function renderOnsite(data){
    const onsite = rec(get(data,'视线内对象',{}));
    const items = Object.entries(onsite);
    if(!items.length) return `<div class="card"><div class="empty">当前视线内没有可观察角色。</div></div>`;
    return `<div class="card"><h3>在场角色</h3><div class="list">${items.map(([name,info])=>`<div class="role-card"><div class="role-top"><div><div class="name">${esc(name)}</div><div class="muted">${esc(val(info.当前观察,'当前没有额外观察'))}</div></div><span class="tag">${esc(val(info.距离感,'同一场域内'))}</span></div><div class="row">${kv('动作姿态',info.动作姿态)}${kv('可感知来源',info.可感知来源)}${kv('面貌',info.面貌)}${kv('发型发色',info.发型发色)}${kv('配饰',info.配饰)}${kv('上衣 / 下装',`${val(info.上衣,'看不清')} / ${val(info.下装,'看不清')}`)}</div></div>`).join('')}</div></div>`;
  }
  function profileFromSlot(data,slot){ return rec(get(data,`女角色档案.${slot}`, get(data,`角色详情.${slot}`, {}))); }
  function examFromSlot(data,slot){ return rec(get(data,`体检记录.${slot}`, {})); }
  function socialGraphFromSlot(data,slot){ return rec(get(data,`社会关系网.${slot}`, {})); }
  function deriveRoles(data){
    const summarySlots = rec(get(data,'角色索引',{}));
    return slotNames.map(slot => [slot, rec(summarySlots[slot])]).filter(([,item])=>!!item.是否已建档).map(([slot,item])=>({
      slot, name: val(item.角色名,slot), job: val(item.职业,'身份未明'), relation: val(item.感情关系,'未知'), bodyRelation: val(item.肉体关系,'未知'), updated: val(item.最近更新,'暂无更新'), inScene: !!item.当前是否在场, profile: profileFromSlot(data,slot), exam: examFromSlot(data,slot), graph: socialGraphFromSlot(data,slot)
    }));
  }
  function renderRoles(data){
    const roles = deriveRoles(data); if(!roles.length) return `<div class="card"><div class="empty">当前还没有已建档角色。</div></div>`;
    const selected = roles.find(r=>r.slot===state.selectedRole); if(selected) return roleDetailSection(selected);
    return `<div class="card"><h3>角色档案</h3><div class="list">${roles.map(role=>`<div class="role-card"><div class="role-top"><div><div class="name">${esc(role.name)}</div><div class="muted">${esc(role.job)}</div></div><span class="tag">${esc(role.inScene?'在场':'离场')}</span></div><div class="row">${kv('感情关系',role.relation)}${kv('肉体关系',role.bodyRelation)}${kv('最近更新',role.updated)}${kv('当前状态',role.inScene?'当前在场':'当前不在场')}</div><div class="actions"><button class="btn secondary" data-action="open-role" data-slot="${esc(role.slot)}">查看详细档案</button></div></div>`).join('')}</div></div>`;
  }
  function roleDetailSection(role){
    const profile = role.profile || {}; const basic = rec(profile.基础资料); const body = rec(profile.外观身体); const sex = rec(profile.性与亲密); const relation = rec(profile.关系状态);
    let inner = '';
    if(state.selectedRoleTab === 'summary') inner = `<div class="grid">${kv('职业',basic.职业 || role.job)}${kv('婚姻状况',basic.婚姻状况)}${kv('性格',basic.性格)}${kv('认识途径',basic.认识途径)}${kv('感情关系',relation.感情关系 || role.relation)}${kv('最近更新',role.updated)}</div>`;
    else if(state.selectedRoleTab === 'body') inner = `<div class="grid">${kv('身材类型',body.身材类型,sourceMeta(profile,'身材类型'))}${kv('当前观感',body.当前观感,sourceMeta(profile,'当前观感'))}${kv('可观察体态',body.可观察体态,sourceMeta(profile,'可观察体态'))}${kv('变化记录',body.变化记录)}${kv('精确数据状态',body.精确数据状态)}${kv('提示','精确体重、围度、罩杯、胸型、臀型进入体检页；未确认时保持未知。')}</div>`;
    else if(state.selectedRoleTab === 'exam') inner = renderExam(role.exam);
    else if(state.selectedRoleTab === 'intimacy') inner = `<div class="grid">${kv('性经验',sex.性经验,sourceMeta(profile,'性经验'))}${kv('性欲',sex.性欲,sourceMeta(profile,'性欲'))}${kv('性开放尺度',sex.性开放尺度,sourceMeta(profile,'性开放尺度'))}${kv('性上的类型',sex.性上的类型,sourceMeta(profile,'性上的类型'))}${kv('性癖',sex.性癖,sourceMeta(profile,'性癖'))}${kv('肉体关系',sex.肉体关系 || role.bodyRelation,sourceMeta(profile,'肉体关系'))}</div>`;
    else inner = renderSocialGraph(role.graph);
    return `<div class="card"><div class="actions"><button class="btn secondary" data-action="back-roles">返回角色列表</button></div><div class="role-top" style="margin-top:12px"><div><div class="name">${esc(role.name)}</div><div class="muted">${esc(role.job)} · ${esc(role.inScene?'当前在场':'当前不在场')}</div></div></div><div class="detail-tabs"><button class="detail-tab ${state.selectedRoleTab==='summary'?'active':''}" data-detail-tab="summary">摘要</button><button class="detail-tab ${state.selectedRoleTab==='body'?'active':''}" data-detail-tab="body">身体</button><button class="detail-tab ${state.selectedRoleTab==='exam'?'active':''}" data-detail-tab="exam">体检</button><button class="detail-tab ${state.selectedRoleTab==='intimacy'?'active':''}" data-detail-tab="intimacy">性与关系</button><button class="detail-tab ${state.selectedRoleTab==='network'?'active':''}" data-detail-tab="network">社会关系</button></div>${inner}</div>`;
  }
  function renderExam(exam){
    const overview = rec(exam.概况), base = rec(exam.基础数据), measure = rec(exam.围度体态), priv = rec(exam.私密确认);
    const tabs = [['overview','概况'],['base','基础数据'],['measure','围度体态'],['private','私密确认']];
    let body = '';
    if(state.selectedExamTab==='overview') body = `<div class="grid">${kv('目标角色',overview.目标角色)}${kv('最近体检时间',overview.最近体检时间)}${kv('最近体检来源',overview.最近体检来源)}${kv('可信度',overview.可信度)}${kv('记录摘要',overview.记录摘要)}</div>`;
    else if(state.selectedExamTab==='base') body = `<div class="grid">${kv('身高',base.身高)}${kv('体重',base.体重)}${kv('BMI',base.BMI)}${kv('体脂率',base.体脂率)}</div>`;
    else if(state.selectedExamTab==='measure') body = `<div class="grid">${kv('胸围',measure.胸围)}${kv('腰围',measure.腰围)}${kv('臀围',measure.臀围)}${kv('大腿围',measure.大腿围)}${kv('罩杯',measure.罩杯)}${kv('胸型',measure.胸型)}${kv('臀型',measure.臀型)}</div>`;
    else {
      const fertility = rec(priv.生育与避孕), cycle = rec(priv.生理状态), vulva = rec(priv.阴部确认), anal = rec(priv.后庭确认);
      body = `<div class="grid">${kv('确认状态',priv.状态)}${kv('确认来源',priv.确认来源)}${kv('确认时间',priv.确认时间)}${kv('可信度',priv.可信度)}</div><div class="card"><h3>生育与避孕</h3><div class="grid">${kv('避孕方式',fertility.避孕方式)}${kv('风险状态',fertility.风险状态)}${kv('最近确认',fertility.最近确认)}${kv('是否需要复查',fertility.是否需要复查)}</div></div><div class="card"><h3>生理状态</h3><div class="grid">${kv('周期规律',cycle.周期规律)}${kv('近期周期',cycle.近期周期)}${kv('妇科健康',cycle.妇科健康)}${kv('近期不适',cycle.近期不适)}</div></div><div class="card"><h3>阴部确认</h3><div class="grid">${kv('颜色',vulva.颜色)}${kv('毛发管理',vulva.毛发管理)}${kv('紧致度',vulva.紧致度)}${kv('湿润度',vulva.湿润度)}${kv('敏感度',vulva.敏感度)}${kv('气味',vulva.气味)}${kv('入口状态',vulva.入口状态)}${kv('近期痕迹',vulva.近期痕迹)}${kv('恢复情况',vulva.恢复情况)}</div></div><div class="card"><h3>后庭确认</h3><div class="grid">${kv('颜色',anal.颜色)}${kv('紧致度',anal.紧致度)}${kv('湿润度',anal.湿润度)}${kv('敏感度',anal.敏感度)}${kv('接受程度',anal.接受程度)}${kv('入口状态',anal.入口状态)}${kv('近期痕迹',anal.近期痕迹)}${kv('恢复情况',anal.恢复情况)}</div></div>`;
    }
    return `<div class="exam-tabs">${tabs.map(([id,label])=>`<button class="exam-tab ${state.selectedExamTab===id?'active':''}" data-exam-tab="${id}">${label}</button>`).join('')}</div><div style="margin-top:12px">${body}</div>`;
  }
  function renderSocialGraph(graph){
    return `<div class="grid">${kv('配偶/伴侣',graph.配偶伴侣)}${kv('家庭关系',graph.家庭关系)}${kv('工作圈',graph.工作圈)}${kv('熟人圈',graph.熟人圈)}</div>`;
  }
  function renderSocial(data){
    const social = rec(get(data,'社交状态',{})); const forum = rec(get(data,'论坛状态',{}));
    return `<div class="card"><h3>社交通知</h3><div class="mini-grid">${kv('微信未读',val(social.微信未读,'0'))}${kv('论坛私信',val(forum.未读私信,'0'))}${kv('帖子热度',forum.帖子热度 || '暂无')}</div></div><div class="card"><h3>最近动态</h3><div class="grid">${kv('最近聊天对象',social.最近聊天对象 || '暂无')}${kv('朋友圈新动态',social.朋友圈新动态 || '暂无')}${kv('最近社交暗示',social.最近社交暗示 || '暂无')}${kv('最近热帖',forum.最近热帖 || '暂无')}</div><div class="quick-actions"><button class="btn" data-fill="打开微信聊天">打开微信</button><button class="btn" data-fill="打开论坛主页">打开论坛</button><button class="btn" data-fill="查看朋友圈">看看朋友圈</button><button class="btn secondary" data-fill="查看论坛私信">看论坛私信</button></div></div>`;
  }
  function render(){
    const data = allVars();
    const overview = deriveOverview(data);
    document.getElementById('meta').innerHTML = `${esc(overview.time)}<br>${esc(overview.place)}`;
    document.getElementById('reminder').textContent = `当前焦点：${overview.focus}`;
    const panels = { overview: renderOverview(data), onsite: renderOnsite(data), roles: renderRoles(data), social: renderSocial(data) };
    Object.entries(panels).forEach(([key,html])=>{ const node = document.querySelector(`[data-panel="${key}"]`); if(node) node.innerHTML = html; });
    document.querySelectorAll('.tab').forEach(btn=>btn.classList.toggle('active',btn.dataset.tab===state.activeTab));
    document.querySelectorAll('.panel').forEach(panel=>panel.classList.toggle('active',panel.dataset.panel===state.activeTab));
  }
  document.addEventListener('click',(event)=>{
    const tab = event.target.closest('[data-tab]'); if(tab){ state.activeTab=tab.dataset.tab; render(); return; }
    const open = event.target.closest('[data-action="open-role"]'); if(open){ state.selectedRole=open.dataset.slot; state.selectedRoleTab='summary'; state.selectedExamTab='overview'; render(); return; }
    const back = event.target.closest('[data-action="back-roles"]'); if(back){ state.selectedRole=null; render(); return; }
    const detail = event.target.closest('[data-detail-tab]'); if(detail){ state.selectedRoleTab=detail.dataset.detailTab; render(); return; }
    const exam = event.target.closest('[data-exam-tab]'); if(exam){ state.selectedExamTab=exam.dataset.examTab; render(); return; }
    const fill = event.target.closest('[data-fill]'); if(fill) fillInput(fill.dataset.fill);
  });
  render();
  try { if(window.Mvu?.events && window.eventOn) window.eventOn(window.Mvu.events.VARIABLE_UPDATE_ENDED, render); } catch(e){}
  setInterval(render, 3000);
})();
</script>
