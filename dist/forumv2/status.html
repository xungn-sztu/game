<meta charset="utf-8">
<style>
body{margin:0;padding:12px;background:transparent;color:#eee;font-family:"Segoe UI","Microsoft YaHei",sans-serif}
.wrap{max-width:780px;margin:0 auto;background:#151515;border:1px solid rgba(224,49,49,.25);border-radius:18px;overflow:hidden}
.head{background:#202020;padding:14px 16px;border-bottom:1px solid rgba(224,49,49,.22);display:flex;justify-content:space-between;gap:12px}
.title{font-size:18px;font-weight:800}
.sub{color:#aaa;font-size:12px;line-height:1.7}
.meta{color:#b9b9b9;font-size:12px;text-align:right;line-height:1.7}
.reminder{margin:12px;border:1px solid rgba(224,49,49,.22);background:#211516;border-radius:14px;padding:10px 12px;color:#f2dede;font-size:13px;line-height:1.7}
.tabs{display:flex;gap:8px;padding:0 12px 12px;flex-wrap:wrap}
.tab{border:1px solid rgba(224,49,49,.38);background:#2a1719;color:#f5d6d6;border-radius:999px;padding:8px 12px;cursor:pointer}
.tab.active{background:#7b2428;color:#fff;border-color:#bb5056}
.content{padding:0 12px 12px}
.panel{display:none}
.panel.active{display:block}
.card{background:#202020;border:1px solid rgba(224,49,49,.22);border-radius:14px;padding:12px;margin-bottom:10px}
.card h3{margin:0 0 10px;font-size:16px}
.muted{color:#aaa;font-size:12px;line-height:1.7}
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.mini-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
.kv{background:#191919;border:1px solid rgba(224,49,49,.16);border-radius:12px;padding:10px}
.k{font-size:12px;color:#9e9e9e;margin-bottom:5px}
.v{font-size:15px;color:#f0f0f0;line-height:1.5;word-break:break-word}
.list{display:flex;flex-direction:column;gap:10px}
.role-card{background:#191919;border:1px solid rgba(224,49,49,.16);border-radius:14px;padding:12px}
.role-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
.name{font-size:16px;font-weight:800}
.tag{display:inline-flex;align-items:center;border:1px solid rgba(224,49,49,.28);border-radius:999px;padding:2px 8px;font-size:12px;color:#f1c4c4}
.row{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:10px}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.btn{border:1px solid rgba(224,49,49,.32);background:#2a1719;color:#f5d6d6;border-radius:999px;padding:8px 12px;cursor:pointer}
.btn.secondary{background:#1c1c1c;color:#ddd;border-color:rgba(255,255,255,.14)}
.empty{padding:18px 12px;color:#a9a9a9;text-align:center;border:1px dashed rgba(224,49,49,.18);border-radius:12px}
.detail-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.detail-tab{border:1px solid rgba(224,49,49,.24);background:#181818;color:#ddd;border-radius:999px;padding:6px 10px;cursor:pointer}
.detail-tab.active{background:#7b2428;color:#fff;border-color:#bb5056}
.source{font-size:11px;color:#c89b9b;margin-top:4px}
.quick-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
@media (max-width:640px){.grid,.row,.mini-grid{grid-template-columns:1fr}}
</style>
<div class="wrap">
  <div class="head">
    <div>
      <div class="title">论坛v2</div>
      <div class="sub">状态栏只负责当前认知、在场观察、已知角色和社交通知，不承担完整论坛浏览。</div>
    </div>
    <div class="meta" id="meta">未同步<br>现实中</div>
  </div>
  <div class="reminder" id="reminder">正在等待变量载入。</div>
  <div class="tabs">
    <button class="tab active" data-tab="overview">概览</button>
    <button class="tab" data-tab="onsite">在场</button>
    <button class="tab" data-tab="roles">角色</button>
    <button class="tab" data-tab="social">社交</button>
  </div>
  <div class="content">
    <div class="panel active" data-panel="overview"></div>
    <div class="panel" data-panel="onsite"></div>
    <div class="panel" data-panel="roles"></div>
    <div class="panel" data-panel="social"></div>
  </div>
</div>
<script>
(function(){
  const state = {
    activeTab: 'overview',
    selectedRole: null,
    selectedRoleTab: 'summary',
  };

  function hostDocument() {
    try {
      return window.parent && window.parent.document ? window.parent.document : document;
    } catch (error) {
      return document;
    }
  }

  function fillInput(text) {
    const doc = hostDocument();
    const textarea =
      doc.querySelector('#send_textarea') ||
      doc.querySelector('textarea[name="message"]') ||
      doc.querySelector('textarea');
    if (!textarea) return false;
    const proto = (textarea.ownerDocument.defaultView || window).HTMLTextAreaElement.prototype;
    const desc = Object.getOwnPropertyDescriptor(proto, 'value');
    if (desc && desc.set) desc.set.call(textarea, text);
    else textarea.value = text;
    textarea.dispatchEvent(new Event('input', { bubbles: true, cancelable: true }));
    textarea.dispatchEvent(new Event('change', { bubbles: true }));
    textarea.focus();
    return true;
  }

  function normalize(value) {
    if (value && typeof value === 'object') return value;
    if (typeof value === 'string') {
      try { return JSON.parse(value); } catch (error) {}
    }
    return {};
  }

  function allVars() {
    try {
      if (window.getAllVariables) return normalize(window.getAllVariables().stat_data);
    } catch (error) {}
    try {
      const ctx = (window.SillyTavern || window.parent.SillyTavern).getContext();
      if (ctx && ctx.variables && ctx.variables.local) return normalize(ctx.variables.local.get('stat_data'));
    } catch (error) {}
    return {};
  }

  function get(obj, path, fallback = '') {
    try {
      const parts = path.split('.');
      let cur = obj;
      for (const part of parts) {
        if (cur == null || !(part in cur)) return fallback;
        cur = cur[part];
      }
      return cur == null || cur === '' ? fallback : cur;
    } catch (error) {
      return fallback;
    }
  }

  function asRecord(value) {
    return value && typeof value === 'object' ? value : {};
  }

  function asArray(value) {
    return Array.isArray(value) ? value : [];
  }

  function valueOrUnknown(value, fallback = '未知') {
    if (value == null) return fallback;
    if (typeof value === 'string') {
      const trimmed = value.trim();
      return trimmed ? trimmed : fallback;
    }
    if (typeof value === 'number' || typeof value === 'boolean') return String(value);
    return fallback;
  }

  function sourceMeta(profile, key) {
    const meta = get(profile, `认知来源.${key}`, null);
    if (!meta) return '';
    if (typeof meta === 'string') return `来源：${meta}`;
    const source = meta.信息来源 || '未知';
    const cognition = meta.认知状态 || '未证实';
    return `来源：${source} / ${cognition}`;
  }

  function deriveOverview(data) {
    const social = asRecord(get(data, '社交状态', {}));
    const forum = asRecord(get(data, '论坛状态', {}));
    const main = asRecord(get(data, '主角简档', {}));
    const time = valueOrUnknown(get(data, '世界.时间', '未同步'));
    const place = valueOrUnknown(get(data, '世界.地点', '未知地点'));
    const money =
      main['身上的钱'] ||
      main['现金'] ||
      get(data, '主角.金钱', '') ||
      get(data, '主角.身上的钱', '') ||
      '未知';
    const currentState =
      main['当前状态'] ||
      get(data, '主角.当前状态', '') ||
      (Object.keys(asRecord(get(data, '视线内对象', {}))).length ? '环境中有人在场' : '当前无人进入视线');
    const phoneState =
      main['手机状态'] ||
      (Number(social['微信未读'] || 0) > 0 ? `微信有 ${social['微信未读']} 条未读` : '手机安静');
    const recentMovement =
      main['最近动向'] ||
      social['最近聊天对象'] ||
      forum['最近记录帖'] ||
      '暂无明显变动';
    const focus =
      main['当前焦点'] ||
      main['当前目标'] ||
      '等待玩家下一步动作';
    return { time, place, money: valueOrUnknown(money), currentState, phoneState, recentMovement, focus };
  }

  function deriveReminder(data) {
    const social = asRecord(get(data, '社交状态', {}));
    const forum = asRecord(get(data, '论坛状态', {}));
    const onsite = Object.keys(asRecord(get(data, '视线内对象', {}))).length;
    const wx = Number(social['微信未读'] || 0);
    const pm = Number(forum['未读私信'] || 0);
    const focus = valueOrUnknown(get(data, '主角简档.当前焦点', get(data, '主角简档.当前目标', '等你决定下一步。')), '等你决定下一步。');
    return `当前焦点：${focus}｜微信未读 ${wx}｜论坛私信 ${pm}｜在场角色 ${onsite}`;
  }

  function deriveOnsite(data) {
    const onsite = asRecord(get(data, '视线内对象', {}));
    return Object.entries(onsite).map(([name, info]) => ({
      name,
      observation: valueOrUnknown(get(info, '当前观察', ''), '当前没有额外观察'),
      face: valueOrUnknown(get(info, '面貌', '未见清')),
      hair: valueOrUnknown(get(info, '发型发色', '未知')),
      accessory: valueOrUnknown(get(info, '配饰', '无明显配饰')),
      top: valueOrUnknown(get(info, '上衣', '看不清')),
      bottom: valueOrUnknown(get(info, '下装', '看不清')),
      distance: valueOrUnknown(get(info, '距离感', get(info, '场域关系', '同一场域内')), '同一场域内'),
    }));
  }

  function profileFromSlot(data, slot) {
    const main = get(data, `女角色档案.${slot}`, null);
    if (main && typeof main === 'object') return main;
    const backup = get(data, `角色详情.${slot}`, null);
    return backup && typeof backup === 'object' ? backup : null;
  }

  function deriveRoles(data) {
    const summarySlots = asRecord(get(data, '角色索引', {}));
    return Object.entries(summarySlots)
      .filter(([, item]) => item && item['是否已建档'])
      .map(([slot, item]) => ({
        slot,
        name: valueOrUnknown(item['角色名'], slot),
        job: valueOrUnknown(item['职业'] || item['公开头衔'], '身份未明'),
        relation: valueOrUnknown(item['感情关系'] || item['关系性质'], '未知'),
        bodyRelation: valueOrUnknown(item['肉体关系'] || item['亲密程度'], '未知'),
        updated: valueOrUnknown(item['最近更新'], '暂无更新'),
        inScene: !!item['当前是否在场'],
        profile: profileFromSlot(data, slot),
      }));
  }

  function renderOverview(data) {
    const overview = deriveOverview(data);
    return `
      <div class="card">
        <h3>当前处境</h3>
        <div class="grid">
          <div class="kv"><div class="k">时间</div><div class="v">${escapeHtml(overview.time)}</div></div>
          <div class="kv"><div class="k">地点</div><div class="v">${escapeHtml(overview.place)}</div></div>
          <div class="kv"><div class="k">当前状态</div><div class="v">${escapeHtml(overview.currentState)}</div></div>
          <div class="kv"><div class="k">当前焦点</div><div class="v">${escapeHtml(overview.focus)}</div></div>
        </div>
      </div>
      <div class="card">
        <h3>身上资源</h3>
        <div class="grid">
          <div class="kv"><div class="k">身上的钱</div><div class="v">${escapeHtml(overview.money)}</div></div>
          <div class="kv"><div class="k">手机状态</div><div class="v">${escapeHtml(overview.phoneState)}</div></div>
        </div>
      </div>
      <div class="card">
        <h3>眼前变化</h3>
        <div class="grid">
          <div class="kv"><div class="k">最近动向</div><div class="v">${escapeHtml(overview.recentMovement)}</div></div>
          <div class="kv"><div class="k">当前提醒</div><div class="v">${escapeHtml(deriveReminder(data))}</div></div>
        </div>
      </div>`;
  }

  function renderOnsite(data) {
    const onsite = deriveOnsite(data);
    if (!onsite.length) return `<div class="card"><div class="empty">当前视线内没有可观察角色。</div></div>`;
    return `<div class="card"><h3>在场角色</h3><div class="list">${
      onsite.map((item) => `
        <div class="role-card">
          <div class="role-top">
            <div>
              <div class="name">${escapeHtml(item.name)}</div>
              <div class="muted">${escapeHtml(item.observation)}</div>
            </div>
            <span class="tag">${escapeHtml(item.distance)}</span>
          </div>
          <div class="row">
            <div class="kv"><div class="k">面貌</div><div class="v">${escapeHtml(item.face)}</div></div>
            <div class="kv"><div class="k">发型发色</div><div class="v">${escapeHtml(item.hair)}</div></div>
            <div class="kv"><div class="k">配饰</div><div class="v">${escapeHtml(item.accessory)}</div></div>
            <div class="kv"><div class="k">上衣 / 下装</div><div class="v">${escapeHtml(item.top)} / ${escapeHtml(item.bottom)}</div></div>
          </div>
        </div>`).join('')
    }</div></div>`;
  }

  function roleDetailSection(role) {
    const profile = role.profile || {};
    const basic = asRecord(get(profile, '基础资料', {}));
    const body = asRecord(get(profile, '外观身体', {}));
    const sex = asRecord(get(profile, '性与亲密', {}));
    const relation = asRecord(get(profile, '关系状态', {}));
    const detailTab = state.selectedRoleTab;

    let inner = '';
    if (detailTab === 'summary') {
      inner = `
        <div class="grid">
          <div class="kv"><div class="k">职业</div><div class="v">${escapeHtml(valueOrUnknown(basic['职业'], role.job))}</div></div>
          <div class="kv"><div class="k">婚姻状况</div><div class="v">${escapeHtml(valueOrUnknown(basic['婚姻状况']))}</div></div>
          <div class="kv"><div class="k">性格</div><div class="v">${escapeHtml(valueOrUnknown(basic['性格']))}</div></div>
          <div class="kv"><div class="k">认识途径</div><div class="v">${escapeHtml(valueOrUnknown(basic['认识途径']))}</div></div>
          <div class="kv"><div class="k">感情关系</div><div class="v">${escapeHtml(valueOrUnknown(relation['感情关系'], role.relation))}</div></div>
          <div class="kv"><div class="k">最近更新</div><div class="v">${escapeHtml(role.updated)}</div></div>
        </div>`;
    } else if (detailTab === 'body') {
      inner = `
        <div class="grid">
          <div class="kv"><div class="k">年龄</div><div class="v">${escapeHtml(valueOrUnknown(basic['年龄']))}</div>${metaHtml(sourceMeta(profile, '年龄'))}</div>
          <div class="kv"><div class="k">身高</div><div class="v">${escapeHtml(valueOrUnknown(basic['身高']))}</div>${metaHtml(sourceMeta(profile, '身高'))}</div>
          <div class="kv"><div class="k">身材类型</div><div class="v">${escapeHtml(valueOrUnknown(body['身材类型']))}</div>${metaHtml(sourceMeta(profile, '身材类型'))}</div>
          <div class="kv"><div class="k">当前观感</div><div class="v">${escapeHtml(valueOrUnknown(body['当前观感']))}</div>${metaHtml(sourceMeta(profile, '当前观感'))}</div>
          <div class="kv"><div class="k">体重</div><div class="v">${escapeHtml(valueOrUnknown(body['体重']))}</div>${metaHtml(sourceMeta(profile, '体重'))}</div>
          <div class="kv"><div class="k">三围</div><div class="v">${escapeHtml(valueOrUnknown(body['三围']))}</div>${metaHtml(sourceMeta(profile, '三围'))}</div>
        </div>`;
    } else {
      inner = `
        <div class="grid">
          <div class="kv"><div class="k">性经验</div><div class="v">${escapeHtml(valueOrUnknown(sex['性经验']))}</div>${metaHtml(sourceMeta(profile, '性经验'))}</div>
          <div class="kv"><div class="k">性欲</div><div class="v">${escapeHtml(valueOrUnknown(sex['性欲']))}</div>${metaHtml(sourceMeta(profile, '性欲'))}</div>
          <div class="kv"><div class="k">性开放尺度</div><div class="v">${escapeHtml(valueOrUnknown(sex['性开放尺度']))}</div>${metaHtml(sourceMeta(profile, '性开放尺度'))}</div>
          <div class="kv"><div class="k">性上的类型</div><div class="v">${escapeHtml(valueOrUnknown(sex['性上的类型']))}</div>${metaHtml(sourceMeta(profile, '性上的类型'))}</div>
          <div class="kv"><div class="k">肉体关系</div><div class="v">${escapeHtml(valueOrUnknown(sex['肉体关系'], role.bodyRelation))}</div>${metaHtml(sourceMeta(profile, '肉体关系'))}</div>
          <div class="kv"><div class="k">关系偏移</div><div class="v">${escapeHtml(valueOrUnknown(relation['关系偏移']))}</div>${metaHtml(sourceMeta(profile, '关系偏移'))}</div>
        </div>`;
    }

    return `
      <div class="card">
        <div class="actions">
          <button class="btn secondary" data-action="back-roles">返回角色列表</button>
        </div>
        <div class="role-top" style="margin-top:12px">
          <div>
            <div class="name">${escapeHtml(role.name)}</div>
            <div class="muted">${escapeHtml(role.job)}｜${escapeHtml(role.inScene ? '当前在场' : '当前不在场')}</div>
          </div>
        </div>
        <div class="detail-tabs">
          <button class="detail-tab ${detailTab === 'summary' ? 'active' : ''}" data-detail-tab="summary">摘要</button>
          <button class="detail-tab ${detailTab === 'body' ? 'active' : ''}" data-detail-tab="body">身体</button>
          <button class="detail-tab ${detailTab === 'intimacy' ? 'active' : ''}" data-detail-tab="intimacy">性与关系</button>
        </div>
        ${inner}
      </div>`;
  }

  function renderRoles(data) {
    const roles = deriveRoles(data);
    if (!roles.length) return `<div class="card"><div class="empty">当前还没有已建档角色。</div></div>`;
    const selected = roles.find((role) => role.slot === state.selectedRole);
    if (selected) return roleDetailSection(selected);
    return `
      <div class="card">
        <h3>角色档案</h3>
        <div class="list">
          ${roles.map((role) => `
            <div class="role-card">
              <div class="role-top">
                <div>
                  <div class="name">${escapeHtml(role.name)}</div>
                  <div class="muted">${escapeHtml(role.job)}</div>
                </div>
                <span class="tag">${escapeHtml(role.inScene ? '在场' : '离场')}</span>
              </div>
              <div class="row">
                <div class="kv"><div class="k">感情关系</div><div class="v">${escapeHtml(role.relation)}</div></div>
                <div class="kv"><div class="k">肉体关系</div><div class="v">${escapeHtml(role.bodyRelation)}</div></div>
                <div class="kv"><div class="k">最近更新</div><div class="v">${escapeHtml(role.updated)}</div></div>
                <div class="kv"><div class="k">当前状态</div><div class="v">${escapeHtml(role.inScene ? '当前在场' : '当前不在场')}</div></div>
              </div>
              <div class="actions">
                <button class="btn secondary" data-action="open-role" data-slot="${escapeHtml(role.slot)}">查看详情</button>
              </div>
            </div>`).join('')}
        </div>
      </div>`;
  }

  function renderSocial(data) {
    const social = asRecord(get(data, '社交状态', {}));
    const forum = asRecord(get(data, '论坛状态', {}));
    return `
      <div class="card">
        <h3>社交通知</h3>
        <div class="mini-grid">
          <div class="kv"><div class="k">微信未读</div><div class="v">${escapeHtml(valueOrUnknown(social['微信未读'], '0'))}</div></div>
          <div class="kv"><div class="k">论坛私信</div><div class="v">${escapeHtml(valueOrUnknown(forum['未读私信'], '0'))}</div></div>
          <div class="kv"><div class="k">帖子热度</div><div class="v">${escapeHtml(valueOrUnknown(forum['帖子热度'], '暂无'))}</div></div>
        </div>
      </div>
      <div class="card">
        <h3>最近动态</h3>
        <div class="grid">
          <div class="kv"><div class="k">最近聊天对象</div><div class="v">${escapeHtml(valueOrUnknown(social['最近聊天对象'], '暂无'))}</div></div>
          <div class="kv"><div class="k">朋友圈新动态</div><div class="v">${escapeHtml(valueOrUnknown(social['朋友圈新动态'], '暂无'))}</div></div>
          <div class="kv"><div class="k">最近社交暗示</div><div class="v">${escapeHtml(valueOrUnknown(social['最近社交暗示'], '暂无'))}</div></div>
          <div class="kv"><div class="k">最近热帖</div><div class="v">${escapeHtml(valueOrUnknown(forum['最近热帖'], '暂无'))}</div></div>
        </div>
        <div class="quick-actions">
          <button class="btn" data-fill="打开微信聊天">打开微信</button>
          <button class="btn" data-fill="打开论坛主页">打开论坛</button>
          <button class="btn" data-fill="查看朋友圈">看朋友圈</button>
          <button class="btn secondary" data-fill="查看论坛私信">看论坛私信</button>
        </div>
      </div>`;
  }

  function metaHtml(text) {
    return text ? `<div class="source">${escapeHtml(text)}</div>` : '';
  }

  function escapeHtml(value) {
    return String(value ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function render() {
    const data = allVars();
    const panels = {
      overview: renderOverview(data),
      onsite: renderOnsite(data),
      roles: renderRoles(data),
      social: renderSocial(data),
    };
    for (const [key, html] of Object.entries(panels)) {
      const node = document.querySelector(`[data-panel="${key}"]`);
      if (node) node.innerHTML = html;
    }

    const time = valueOrUnknown(get(data, '世界.时间', '未同步'));
    const place = valueOrUnknown(get(data, '世界.地点', '现实中'));
    document.getElementById('meta').innerHTML = `${escapeHtml(time)}<br>${escapeHtml(place)}`;
    document.getElementById('reminder').textContent = deriveReminder(data);
  }

  document.addEventListener('click', (event) => {
    const tab = event.target.closest('[data-tab]');
    if (tab) {
      state.activeTab = tab.dataset.tab;
      document.querySelectorAll('.tab').forEach((node) => node.classList.toggle('active', node.dataset.tab === state.activeTab));
      document.querySelectorAll('.panel').forEach((node) => node.classList.toggle('active', node.dataset.panel === state.activeTab));
      return;
    }

    const fill = event.target.closest('[data-fill]');
    if (fill) {
      fillInput(fill.dataset.fill);
      return;
    }

    const action = event.target.closest('[data-action]');
    if (action) {
      if (action.dataset.action === 'open-role') {
        state.selectedRole = action.dataset.slot;
        state.selectedRoleTab = 'summary';
        render();
      } else if (action.dataset.action === 'back-roles') {
        state.selectedRole = null;
        state.selectedRoleTab = 'summary';
        render();
      }
      return;
    }

    const detailTab = event.target.closest('[data-detail-tab]');
    if (detailTab) {
      state.selectedRoleTab = detailTab.dataset.detailTab;
      render();
    }
  });

  render();
  setInterval(render, 2500);
})();
</script>
