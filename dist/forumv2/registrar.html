<meta charset="utf-8">
<style>
body{margin:0;padding:14px;background:transparent;color:#eadfda;font-family:"Segoe UI","Microsoft YaHei",sans-serif}.fv2-reg{max-width:900px;margin:0 auto;background:#151111;border:1px solid rgba(202,43,43,.32);border-radius:18px;overflow:hidden;box-shadow:0 18px 46px rgba(0,0,0,.38)}.head{background:linear-gradient(135deg,#7d151b,#c72b2b);padding:16px 18px;color:#fff}.head h2{margin:0 0 6px;font-size:20px}.head p{margin:0;color:#f5d6d6;font-size:13px;line-height:1.7}.body{padding:14px;display:grid;gap:12px}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}@media(max-width:760px){.grid{grid-template-columns:1fr}}.field{border:1px solid rgba(255,255,255,.08);background:#201819;border-radius:14px;padding:12px}.label{font-weight:800;margin-bottom:4px}.hint{color:#b9aaa5;font-size:12px;line-height:1.55;margin-bottom:8px}.opts{display:flex;flex-wrap:wrap;gap:7px}.opt{border:1px solid rgba(202,43,43,.36);background:#2b1c1f;color:#efd6d6;border-radius:999px;padding:7px 10px;cursor:pointer;font-size:13px}.opt:hover,.opt.active{background:#b72b34;color:#fff;border-color:#e75b63}.actions{display:flex;gap:10px;flex-wrap:wrap;border-top:1px solid rgba(255,255,255,.08);padding-top:12px}.btn{border:1px solid rgba(202,43,43,.48);background:#391d21;color:#ffdcdc;border-radius:999px;padding:10px 14px;cursor:pointer;font-weight:700}.btn.primary{background:#c72b2b;color:#fff}.preview{white-space:pre-wrap;background:#100d0d;border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:10px;color:#d8ccc7;font-size:12px;line-height:1.65;max-height:180px;overflow:auto}.note{font-size:12px;color:#a99b96;line-height:1.7}
</style>
<div class="fv2-reg">
  <div class="head">
    <h2>论坛v2 · 角色注册器</h2>
    <p>这是定制第一位可互动角色，不是定制剧情。选择只决定人物底色和首轮建档变量，后续变化必须由聊天、线下互动、体检、引荐或明确事件推进。</p>
  </div>
  <div class="body">
    <div class="grid" id="fields"></div>
    <div class="preview" id="preview"></div>
    <div class="actions">
      <button class="btn primary" id="fill">填入定制指令</button>
      <button class="btn" id="random">随机生成开局角色</button>
      <button class="btn" data-fill="打开论坛主页">打开论坛</button>
      <button class="btn" data-fill="打开微信聊天">打开微信</button>
    </div>
    <div class="note">说明：体检和拿尺测量会解锁精确身体数据；引荐会让新角色出现更自然。注册器不会直接暴露玩家不该知道的隐私信息。</div>
  </div>
</div>
<script>
(function(){
const groups=[
['年龄','影响年龄区间与社会阶段','成熟稳重|30-40岁，社会经验更足，适合精英/教师/职场线','年轻成年|18-24岁，生活经验较少，反应更直接','轻熟|25-32岁，工作与关系压力并存','熟女|35-48岁，现实身份、婚姻和体面感更强'],
['身材类型','影响身材底色，精确数据默认未知','纤细|视觉轻盈，体重和三围不直接公开','匀称|现实感强，不夸张，适合多数职业','丰腴|曲线更明显，但仍需体检或接触确认','高挑|身高感突出，适合精英/教师/职场线','健身型|体态紧实，可能关联运动习惯'],
['外貌类型','替代种族，影响可见外貌气质','清冷|距离感强，说话克制','温婉|亲和、顾虑现实评价','精英感|打扮克制，有职业身份感','邻家|普通真实，社交距离更近','明艳|存在感强，容易被注意'],
['身高','只影响身高区间，精确值可后续确认','娇小|150-158cm区间','中等|159-168cm区间','高挑|169-178cm区间','很高|179cm以上，较少见'],
['职业','影响公开身份、作息和可接触场景','教师|体面、约束强，适合NTL轻压力','白领/主管|职场压力、微信沟通自然','医生/护士|时间碎片化，体检线更自然','自由职业|作息弹性，线上互动更多','学生/研究生|年轻成年，校园/论文/实习压力'],
['性经验','首轮可作为底色，但未必被玩家知道','未知|前端默认隐藏，需要交流确认','较少|反应更谨慎，边界更明显','普通|有现实经验但不夸张','丰富|更懂试探和自我解释','复杂|经历多，但不要标签化'],
['性癖','只作为潜在倾向，不等于立刻暴露','未知|默认最真实，需要慢慢发现','被关注|在意被看见和被评价','轻羞耻|对暧昧压力和语言暗示敏感','控制/被控制|偏权力关系，但不流程化','展示欲|更容易被帖子/朋友圈引动','禁忌感|与隐瞒、轻风险、NTL张力关联'],
['性欲','影响欲望强弱，但不机械服从','低|慢热，现实顾虑更多','中等|正常波动，受情绪和关系影响','偏高|容易被气氛和私聊撩动','压抑|表面克制，私下反差可能更强'],
['婚姻状况','影响现实压力与NTL轻风险','单身|关系推进阻力较低','恋爱中|轻竞争、隐瞒聊天更明显','已婚|体面与现实压力更强，风险弱化处理','离异/分居|成熟线和重新确认自我'],
['认识途径','决定首轮关系来源','论坛私信|由帖子热度或记录帖引流','微信好友|已有线上入口，私聊自然','现实引荐|通过朋友/同事介绍，更真实','线下偶遇|先有观察，再转社交','工作/校园接触|身份和场景约束更强'],
['肉体关系','当前身体接触阶段，不代表未来固定','零接触|只停留在聊天或观察','轻微接触|牵手/擦碰/靠近这类边界','暧昧接触|有身体张力但未明确关系','已有亲密|曾有亲密经历，但需具体事件支撑'],
['性开放尺度','影响边界，不等于标签','保守|需要信任和时间','谨慎开放|会试探，但保留退路','私下开放|公开克制，私聊更敢说','较开放|能接受更直接的沟通和任务，但仍看对象'],
['感情关系','当前情感关系底色','刚认识|信息少，未知多','普通朋友|可聊天但边界清楚','暧昧|有试探和拉扯','旧识/熟人|有历史但未必亲密','秘密关系|适合NTL轻风险和隐瞒张力']
];
const state={};
function hostDoc(){try{return window.parent&&window.parent.document?window.parent.document:document}catch(e){return document}}
function setInput(text){const doc=hostDoc();const t=doc.querySelector('#send_textarea')||doc.querySelector('textarea[name="message"]')||doc.querySelector('textarea');if(!t)return false;const proto=(t.ownerDocument.defaultView||window).HTMLTextAreaElement.prototype;const desc=Object.getOwnPropertyDescriptor(proto,'value');if(desc&&desc.set)desc.set.call(t,text);else t.value=text;t.dispatchEvent(new Event('input',{bubbles:true,cancelable:true}));t.dispatchEvent(new Event('change',{bubbles:true}));t.focus();return true}
function render(){document.getElementById('fields').innerHTML=groups.map(([name,hint,...opts])=>`<div class="field"><div class="label">${name}</div><div class="hint">${hint}</div><div class="opts">${opts.map(o=>{const [v,d]=o.split('|');return `<button class="opt ${state[name]===v?'active':''}" data-field="${name}" data-value="${v}" title="${d}">${v}</button>`}).join('')}</div><div class="hint">${state[name]?opts.find(o=>o.startsWith(state[name]+'|')).split('|')[1]:'未选择时由模型按真实感随机'}</div></div>`).join('');updatePreview()}
function buildPrompt(random=false){const picked=groups.map(([name])=>`${name}: ${state[name]||'随机但保持真实感'}`).join('\n');return random?`随机生成一名论坛v2第一位可互动女性角色，并写入MVU变量。
要求：只使用固定槽位，先更新变量，再进入论坛主页；不要写档案总结。
注册器字段按真实感随机：
${picked}`:`按以下选择定制论坛v2第一位可互动女性角色，并写入MVU变量。
要求：这是定制角色，不是定制剧情；只使用固定槽位；先更新变量，再进入论坛主页；不要写档案总结。
${picked}`}
function updatePreview(){document.getElementById('preview').textContent=buildPrompt(false)}
document.addEventListener('click',e=>{const opt=e.target.closest('.opt');if(opt){state[opt.dataset.field]=opt.dataset.value;render();return}const b=e.target.closest('[data-fill]');if(b)setInput(b.dataset.fill)});
document.getElementById('fill').addEventListener('click',()=>setInput(buildPrompt(false)));
document.getElementById('random').addEventListener('click',()=>setInput(buildPrompt(true)));
render();
})();
</script>
