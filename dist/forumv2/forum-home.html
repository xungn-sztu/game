<meta charset="utf-8">
<style>
  :root{--red:#c92a2a;--red2:#e03131;--bg:#151515;--card:#202020;--line:rgba(224,49,49,.24);--text:#eee;--muted:#aaa}
  body{margin:0;padding:14px;background:transparent;color:var(--text);font-family:"Segoe UI","Microsoft YaHei",sans-serif}
  .wrap{max-width:820px;margin:0 auto;background:var(--bg);border:1px solid var(--line);border-radius:16px;overflow:hidden;box-shadow:0 18px 44px rgba(0,0,0,.36)}
  .head{background:var(--red);padding:14px 16px;display:flex;justify-content:space-between;align-items:center;color:#fff}.title{font-size:20px;font-weight:800}.sub{font-size:12px;opacity:.85;margin-top:3px}
  .content{padding:14px;display:grid;gap:12px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:10px}.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px}.name{font-weight:700;color:#fff}.desc{margin-top:6px;color:var(--muted);font-size:12px;line-height:1.6}
  .hot{color:#ffb3b3}.bar{display:flex;flex-wrap:wrap;gap:8px}button{border:1px solid rgba(224,49,49,.42);background:#2a1719;color:#f5d6d6;border-radius:999px;padding:8px 12px;cursor:pointer}
</style>
<div class="wrap">
  <div class="head"><div><div class="title">论坛v2</div><div class="sub">记录、热帖、私信引流和轻度物色入口</div></div><div id="meta">载入中</div></div>
  <div class="content">
    <div class="bar">
      <button data-fill="查看论坛热帖">热帖</button>
      <button data-fill="发布记录帖：">发记录帖</button>
      <button data-fill="查看论坛私信">私信</button>
      <button data-fill="打开微信聊天">微信</button>
      <button data-fill="查看朋友圈">朋友圈</button>
    </div>
    <div class="grid" id="zones"></div>
  </div>
</div>
<script>
(function(){
const zones=[['记录区','记录进展、后续、评论发酵，帖子火了会带来私信和新联系。'],['约会区','同城、试探、临时邀约，真假混杂但不做重交易。'],['夫妻/关系区','关系偏移、隐瞒、边界后移和轻度NTL压力。'],['调教/经验区','长期塑造、聊天任务和边界讨论，避免教程化。'],['闲聊/打假区','质疑、拱火、吐槽和论坛真实噪音。']];
function doc(){try{return window.parent&&window.parent.document?window.parent.document:document}catch(e){return document}}
function fill(v){const t=doc().querySelector('#send_textarea')||doc().querySelector('textarea');if(!t)return;const d=Object.getOwnPropertyDescriptor(window.HTMLTextAreaElement.prototype,'value');if(d&&d.set)d.set.call(t,v);else t.value=v;t.dispatchEvent(new Event('input',{bubbles:true,cancelable:true}));t.dispatchEvent(new Event('change',{bubbles:true}));t.focus()}
document.getElementById('meta').textContent='等级 / 声望';
document.getElementById('zones').innerHTML=zones.map(z=>`<div class="card"><div class="name">${z[0]}</div><div class="desc">${z[1]}</div><div class="desc hot">点击进入会把指令填入输入栏。</div><p><button data-fill="进入论坛分区：${z[0]}">进入</button> <button data-fill="查看${z[0]}热帖">热帖</button></p></div>`).join('');
document.addEventListener('click',e=>{const b=e.target.closest('[data-fill]');if(b)fill(b.dataset.fill)});
})();
</script>
