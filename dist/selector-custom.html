<style>
  :root { --bg:#111823; --panel:#161f2b; --line:#334153; --text:#dbe4ee; --muted:#95a5b7; --accent:#4ea8ff; }
  * { box-sizing:border-box; }
  body { margin:0; padding:14px; background:transparent; color:var(--text); font-family:"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; }
  .panel { max-width:860px; margin:0 auto; border:1px solid var(--line); border-radius:16px; overflow:hidden; background:linear-gradient(180deg,#0d141d,#182230); box-shadow:0 16px 32px rgba(0,0,0,.25); }
  .head { padding:18px 20px; border-bottom:1px solid var(--line); background:rgba(78,168,255,.08); }
  .head h1 { margin:0 0 8px; font-size:22px; }
  .head p { margin:0; color:var(--muted); font-size:13px; line-height:1.7; }
  .grid { display:grid; grid-template-columns:repeat(2, minmax(0,1fr)); gap:12px; padding:16px; }
  .field { border:1px solid var(--line); border-radius:12px; padding:12px; background:rgba(0,0,0,.12); }
  .field label { display:block; margin-bottom:8px; color:#c4d1dd; font-size:12px; font-weight:700; }
  .field input, .field select, .field textarea { width:100%; background:#0c1219; color:#eef3f8; border:1px solid #425368; border-radius:10px; padding:10px 12px; font-size:13px; }
  .field textarea { min-height:88px; resize:vertical; }
  .wide { grid-column:1 / -1; }
  .foot { display:flex; justify-content:space-between; gap:12px; padding:16px; border-top:1px solid var(--line); align-items:center; }
  .tip { color:var(--muted); font-size:12px; line-height:1.7; }
  .actions { display:flex; gap:10px; flex-wrap:wrap; }
  .btn { cursor:pointer; border-radius:10px; padding:11px 16px; font-size:13px; font-weight:700; border:1px solid #425368; }
  .btn-secondary { background:#17202c; color:#d7e0ea; }
  .btn-primary { background:linear-gradient(135deg,#257bff,#51a8ff); color:#fff; border-color:transparent; }
  @media (max-width: 800px) { .grid { grid-template-columns:1fr; } .foot { flex-direction:column; align-items:stretch; } .btn { width:100%; } }
</style>

<script>
  (function () {
    function value(id) {
      const el = document.getElementById(id);
      return el ? String(el.value || "").trim() : "";
    }
    function promptText() {
      return [
        "\u3010\u5b9a\u5236\u5973\u89d2\u8272\u5e76\u76f4\u63a5\u5f00\u573a\u3011",
        "",
        "\u8bf7\u6839\u636e\u4e0b\u5217\u6761\u4ef6\u751f\u6210\u4e00\u540d\u5b8c\u6574\u5973\u89d2\u8272\uff0c\u5e76\u5199\u5165\u5f53\u524d MVU \u53d8\u91cf\u7cfb\u7edf\u3002",
        "\u5e74\u9f84\u533a\u95f4\uff1a" + value("age"),
        "\u516c\u5f00\u5934\u8854\uff1a" + (value("title") || value("job")),
        "\u8eab\u6750\uff1a" + value("body"),
        "\u804c\u4e1a\uff1a" + value("job"),
        "\u8ba4\u8bc6\u6e20\u9053\uff1a" + value("channel"),
        "\u5173\u7cfb\u6027\u8d28\uff1a" + value("relation"),
        "\u60c5\u611f\u6df1\u5ea6\uff1a" + value("emotion"),
        "\u4eb2\u5bc6\u7a0b\u5ea6\uff1a" + value("intimacy"),
        "\u751f\u6d3b\u6e17\u900f\u5ea6\uff1a" + value("life"),
        "\u5f00\u653e\u7a0b\u5ea6\uff1a" + value("openness"),
        "\u6027\u6001\u5ea6\uff1a" + value("sexAttitude"),
        "\u6027\u6b32\u7a0b\u5ea6\uff1a" + value("desire"),
        "\u4e3b\u6027\u7656\uff1a" + value("fetish"),
        "\u989d\u5916\u8981\u6c42\uff1a" + (value("extra") || "\u65e0"),
        "",
        "\u786c\u6027\u8981\u6c42\uff1a",
        "1. \u9996\u8f6e\u53ea\u5141\u8bb8\u5bf9 /\u89d2\u8272\u7d22\u5f15/\u6863\u68481-4 \u4f7f\u7528 replace \u5199\u5165\u3002",
        "2. \u81f3\u5c11\u5199\u5165\uff1a\u89d2\u8272\u540d\u3001\u5f53\u524d\u662f\u5426\u5728\u573a\u3001\u662f\u5426\u5df2\u5efa\u6863\u3001\u516c\u5f00\u5934\u8854\u3001\u5173\u7cfb\u6027\u8d28\u3001\u60c5\u611f\u6df1\u5ea6\u3001\u751f\u6d3b\u6e17\u900f\u5ea6\u3001\u4eb2\u5bc6\u7a0b\u5ea6\u3001\u6700\u8fd1\u66f4\u65b0\u3002",
        "3. \u8bbe\u4e3a\uff1a\u5f53\u524d\u662f\u5426\u5728\u573a=false\uff0c\u662f\u5426\u5df2\u5efa\u6863=true\uff0c\u6700\u8fd1\u66f4\u65b0=\u6ce8\u518c\u524d\u5efa\u6863\u3002",
        "4. \u4e0d\u8981\u4f7f\u7528\u52a8\u6001\u89d2\u8272\u540d\u8def\u5f84\uff0c\u4e0d\u8981\u8f93\u51fa insert\u3001delta\u3001append\u3002",
        "5. </UpdateVariable> \u4e4b\u540e\u6b63\u6587\u53ea\u80fd\u8f93\u51fa\u4e24\u884c\uff1a\u7b2c\u4e00\u884c\u3010\u6ce8\u518c\u4e3b\u9875\u3011\uff1b\u7b2c\u4e8c\u884c <StatusPlaceHolderImpl/> \u3002"
      ].join("\\n");
    }
    window.Forum1Selector = {
      fillOnly() { Forum1Common.fillInput(promptText()); },
      send() {
        const message = promptText();
        const command = `/send ${message} | /trigger`;
        if (!Forum1Common.triggerCommand(command)) {
          if (Forum1Common.fillInput(message)) setTimeout(() => Forum1Common.clickSend(), 80);
        }
      }
    };
    document.getElementById("fill-only-btn")?.addEventListener("click", () => window.Forum1Selector.fillOnly());
    document.getElementById("send-btn")?.addEventListener("click", () => window.Forum1Selector.send());
  })();
</script>
